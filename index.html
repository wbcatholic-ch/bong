<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매일미사 테스트</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    height:100vh;
    background:#F8F6F2;
    font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    color:#5A4A3A;
}
.spinner{
    width:42px;
    height:42px;
    border:4px solid #E5DED3;
    border-top:4px solid #B89B72;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:18px;
}
@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}
</style>

<script>
window.onload = function () {
    location.replace("https://missa.cbck.or.kr/");
};
</script>
</head>
<body>

<div class="spinner"></div>
<div>매일미사로 이동 중...</div>

</body>
</html>
