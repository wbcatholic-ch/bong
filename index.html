<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <style>
        :root { --primary: #deff9a; --bg: #121212; --card: #1e1e1e; --text: #f5f5f5; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        .header { padding: 40px 20px 20px; background: linear-gradient(to bottom, #1a1a1a, var(--bg)); }
        .header h1 { font-size: 24px; margin: 0; color: var(--primary); }
        .container { padding: 20px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-item { background: #252525; padding: 15px; border-radius: 15px; text-align: center; }
        .stat-val { display: block; font-size: 20px; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 12px; color: #888; }
        #install-btn { display: none; width: 100%; background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-bottom: 20px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; background: #333; color: var(--primary); margin-top: 10px; }
    </style>
    <script>
        // KakaoTalk -> Chrome Redirect
        if (navigator.userAgent.toLowerCase().match(/kakaotalk/i) && navigator.userAgent.toLowerCase().match(/android/i)) {
            location.href = 'intent://' + location.href.replace(/https?:\/\//i, '') + '#Intent;scheme=https;package=com.android.chrome;end';
        }
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
        }
    </script>
</head>
<body>
    <div class="header">
        <h1>PROJECT PWA</h1>
        <div class="status-badge">System Online</div>
    </div>
    <div class="container">
        <button id="install-btn">📱 앱 설치하고 전체화면으로 보기</button>
        
        <div class="card">
            <h3>실시간 현황</h3>
            <div class="stats">
                <div class="stat-item"><span class="stat-val">98.5%</span><span class="stat-label">안정성</span></div>
                <div class="stat-item"><span class="stat-val">1.2s</span><span class="stat-label">로딩 속도</span></div>
            </div>
        </div>

        <div class="card">
            <h3>최근 활동</h3>
            <p style="font-size: 14px; color: #aaa; line-height: 1.6;">
                • 카카오톡 브라우저 감지 완료<br>
                • 크롬 인텐트 리다이렉션 성공<br>
                • 서비스 워커 활성화됨
            </p>
        </div>
    </div>

    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-btn').style.display = 'block';
        });

        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('install-btn').style.display = 'none';
                deferredPrompt = null;
            }
        });
    </script>
</body>
</html>
