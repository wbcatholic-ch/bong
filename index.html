

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>모바일 기도문</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--bg-color: #F7F4F1;
--white: #FFFFFF;
--text-main: #2B2B2B;
--text-sub: #7A6E66;
--primary-pastel: #EDE3DB;
--primary-active: #6B4F3A;
--accent-color: #8B5E3C;
--border-color: #E5DDD6;
--header-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

    * {
box-sizing: border-box;
margin: 0;
padding: 0;
-webkit-tap-highlight-color: transparent;
}

body {
font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
color: #2B2B2B;
background: #F7F4F1;
-webkit-text-size-adjust: 100%;
text-rendering: optimizeLegibility;
}

header {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 60px;
display: flex;
align-items: center;
justify-content: center;
background: linear-gradient(90deg, #6B4F3A, #8B5E3C);
color: #fff;
font-size: 18px;
font-weight: 700;
letter-spacing: -0.02em;
z-index: 100;
box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.tab-container {
position: fixed;
top: 60px;
left: 0;
width: 100%;
display: flex;
gap: 10px;
padding: 12px 16px;
overflow-x: auto;
background: rgba(255,255,255,0.96);
border-bottom: 1px solid #E7DDD6;
z-index: 90;
scrollbar-width: none;
}

.tab-container::-webkit-scrollbar {
display: none;
}

.tab-btn {
flex: 0 0 auto;
min-width: 132px;
height: 56px;
padding: 0 20px;
border-radius: 28px;
border: 1px solid #DDD2C9;
background: #F4EFEA;
color: #6F625A;
font-size: 15px;
font-weight: 700;
letter-spacing: -0.02em;
white-space: nowrap;
}

.tab-btn:hover {
background-color: #F3EEE9;
}

.tab-btn.active {
background: #7B573D;
color: #fff;
border-color: #7B573D;
box-shadow: 0 6px 16px rgba(123,87,61,0.20);
}
#list-view {
padding: 148px 16px 28px;
}

.prayer-list {
list-style: none;
display: flex;
flex-direction: column;
gap: 10px;
}

.prayer-item {
width: 100%;
min-height: 96px;
padding: 0 20px;
background: #FFFDFC;
border: 1px solid #E1D7CF;
border-radius: 18px;
box-shadow: 0 2px 8px rgba(70, 45, 25, 0.05);

display: flex;
align-items: center;
justify-content: space-between;
gap: 14px;
}

.prayer-item:active {
transform: scale(0.99);
}

.prayer-item:hover {
transform: translateY(-1px);
box-shadow: 0 6px 16px rgba(80, 50, 30, 0.12);
border-color: #D6C2B5;
}

.prayer-title {
flex: 1;
min-width: 0;
font-size: 16px;
font-weight: 700;
line-height: 1.45;
letter-spacing: -0.02em;
color: #2D2D2D;
word-break: keep-all;
}

.prayer-icon {
flex: 0 0 22px;
width: 22px;
height: 22px;
display: flex;
align-items: center;
justify-content: center;
color: #8B6A53;
font-size: 18px;
line-height: 1;
}

#detail-view {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100vh;
background-color: var(--bg-color);
z-index: 200;
transform: translateX(100%);
transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
overflow-y: auto;
display: flex;
flex-direction: column;
}

#detail-view.show {
transform: translateX(0);
}

.detail-header {
position: sticky;
top: 0;
width: 100%;
min-height: 60px;
background-color: rgba(255,255,255,0.97);
backdrop-filter: blur(8px);
display: flex;
align-items: center;
padding: 0 16px;
box-shadow: var(--header-shadow);
border-bottom: 1px solid #EEE7E1;
z-index: 210;
}



.detail-title {
flex: 1;
text-align: center;
font-size: 16px;
font-weight: 700;
color: var(--text-main);
margin-right: 20px;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.detail-content {
padding: 28px 24px;
font-size: 16px;
line-height: 2.0;
color: #2B2B2B;
background: #FCFAF8;
margin: 16px;
border-radius: 18px;
border: 1px solid #E6DDD6;
box-shadow: 0 6px 20px rgba(80,50,30,0.06);
}

.detail-content p {
margin-bottom: 18px;
text-align: justify;
word-break: keep-all;
}

.detail-content .rubric {
color: #8B5E3C;
font-size: 13px;
font-weight: 700;
letter-spacing: 0.5px;
margin: 20px 0 10px;
display: block;
text-transform: uppercase;
}

.detail-content .bold {
font-weight: 700;
color: #3A2E25;
}

.detail-content .symbol {
color: var(--accent-color);
font-weight: 700;
}

.detail-content .align-right {
text-align: right;
font-size: 14px;
color: #7A6E66;
margin-top: 20px;
}

.empty-state {
text-align: center;
padding: 56px 20px;
color: var(--text-sub);
font-size: 15px;
background: #FCFAF8;
border: 1px dashed #DDD6CF;
border-radius: 16px;
}


.prayer-title i {
    margin-right: 8px;
    color: #8B5E3C;
    font-size: 14px;
    opacity: 0.9;
}

.prayer-title i,
.prayer-title svg {
    color: #8B5E3C !important;
    fill: #8B5E3C !important;
}

   
</style>
</head>
<body>

<header>기도문</header>

<div class="tab-container">
<button class="tab-btn active" data-category="aim">교구 인준 기도</button>
<button class="tab-btn" data-category="basic">주요 기도</button>
<button class="tab-btn" data-category="special">특수 기도</button>
<button class="tab-btn" data-category="etc">여러가지 기도</button>
<button class="tab-btn" data-category="bong1">위령기도</button>
<button class="tab-btn" data-category="bong2">레지오 마리애</button>
<button class="tab-btn " data-category="bong3">십자가의 길</button>
</div>

<div id="list-view">
<ul class="prayer-list" id="prayer-list">
</ul>
</div>

<div id="detail-view">
<div class="detail-header">
<button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
<div class="detail-title" id="detail-title">기도문</div>
</div>
<div class="detail-content" id="detail-content"></div>
</div>
<script>
        const prayerData = {
            'aim': [
                {id: 'aim_29', title: '2027 서울 세계청년대회 공식 기도문', content: `<p>젊은이를 사랑하시는 주님,<br>저희를 주님의 무한한 사랑과 자비로 초대해 주심에 감사드립니다.</p><p>하느님 아버지,<br>저희 자신을 당신께 맡겨 드리오니,<br>온 세상 젊은이들이 교회의 품 안에서 위로받고<br>친교와 일치의 기쁨을 누리게 하소서.</p><p>‘이미 그리고 영원히’ 세상을 이기신 그리스도님,<br>“용기를 내어라.” 하신 당신의 말씀 안에서<br>온 세상 모든 이가 희망을 발견하고,<br>사랑과 용서의 십자가가 세상에 대한 승리임을 깨닫게 하소서.</p><p>사랑의 불꽃이신 성령님,<br>당신의 놀라운 손길로 이 땅에 복음의 씨앗을 심으셨으니,<br>한국 순교 성인들의 믿음이 저희 가슴에도 타올라<br>평화와 사랑과 진리의 복음을 살아가는 제자가 되게 하소서.</p><p>주님, 이 세계청년대회의 순례 여정을 통해<br>저희 모두가 서로의 목소리를 경청하고<br>그 안에서 당신의 뜻을 찾으며,<br>모든 하느님 백성이 함께 걷는 시노드 교회가 되게 하소서. 아멘</p><p>○ 자비와 평화의 모후이시여,<br>◎ 저희를 위하여 빌어 주소서.<br>○ 서울 세계청년대회의 주보성인들이여,<br>◎ 모든 젊은이들을 위하여 빌어 주소서.</p><p class="align-right">2027 서울 WYD 지역조직위원회</p>`},
                {id: 'aim_28', title: '교황 선출을 위한 기도', content: `<p>○ 오소서 창조주님 성령께서 찾아오사<br>창조하신 마음속에 천상은총 채우소서.</p><p>● 보호자신 성령님은 지존하신 주님선물<br>사랑의샘 불과사랑 우리영혼 축성기름</p><p>○ 약속되신 성령님은 하느님의 손가락<br>일곱은혜 베푸시고 말씀능력 채우시네.</p><p>● 느낌생각 비추시고 마음속에 사랑부어<br>나약하온 저희육신 튼튼하게 고치소서.</p><p>○ 원수들을 멀리쫓아 참된평화 주옵소서.<br>성령님의 인도받아 모든해악 피하리다.</p><p>◎ 성령님은 아버지와 아드님을 알리시니<br>아버지와 아드님의 성령님을 믿나이다.</p><p><span class="symbol">†</span> 기도합시다.<br>주님,<br>교회를 다스리고 지켜 주시니<br>주님의 종들에게 지혜와 진리와 평화의 성령을 보내시어<br>주님의 뜻을 온전히 깨닫고<br>그 뜻을 온 힘을 다하여 실천하게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p>`},
                {id: 'aim_27', title: '프란치스코 교황의 영원한 안식을 위한 기도', content: `<p>영원한 목자이신 하느님 아버지,<br>사랑으로 교회를 다스린 주님의 종 프란치스코를 위하여 바치는<br>하느님 백성의 기도를 들어주소서.</p><p>주님, 자비를 베푸시어,<br>주님의 양 떼를 돌보게 하신 프란치스코 교황에게 영원한 상급을 베풀어 주소서.</p><p>프란치스코 교황은 이 세상에서 사랑의 신비를 충실히 거행하였으니,<br>천상에서 주님과 함께 영원한 기쁨을 누리게 하소서.</p><p>주님께서는 주님의 종 프란치스코를 사랑으로 돌보시어<br>온 교회를 가르치는 슬기로운 교사로 삼으시고<br>이 세상에서 그리스도의 일을 훌륭히 수행하게 하셨으니,<br>저희의 간구를 들으시어<br>프란치스코 교황이 하늘에서 영원한 영광을 누리게 하소서.</p><p>주님의 양 떼를 돌보는 대사제로 뽑으신 주님의 종 프란치스코가<br>이제 하느님 나라의 사제단에 들어 영원한 생명을 누리게 하소서.</p><p>프란치스코 교황은 인류 가족에게 사랑을 베풀며 주님의 평화를 이루는 도구였으니,<br>이제 주님의 종 프란치스코가 하늘의 성인들과 함께 평화를 누리게 하소서.</p><p>우리 주 그리스도를 통하여 비나이다.<br>아멘.</p><p class="align-right">- 한국천주교주교회의 인준</p>`},
                {id: 'aim_26', title: '2025년 희년 기도', content: `<p>하늘에 계신 아버지,<br>우리 형제이신 성자 예수 그리스도를 통하여<br>저희에게 베풀어 주신 믿음과<br>성령을 통하여 저희 마음에 부어 주신<br>불타는 사랑으로<br>아버지의 나라가 오시리라는 복된 희망을<br>저희에게 다시 일깨워 주소서.</p><p>악의 세력이 패배하고<br>아버지의 영광이 영원히 드러나는<br>새 하늘과 새 땅을<br>확신에 차 기다리며<br>온 인류와 우주가 떨쳐 일어나도록<br>아버지의 은총으로<br>저희가 복음의 씨를 뿌리는 성실한 일꾼이 되게 하소서.</p><p>희년의 은총이<br>희망의 순례자인 우리 안에서<br>천상 보화를 향한 갈망을 다시 불러일으키고<br>우리 구원자이신 주님의 기쁨과 평화가<br>온 세상에 흘러넘치게 하소서.</p><p>영원히 복되신 하느님께서는<br>세세 대대로 찬미와 영광을 받으소서.<br>아멘.</p><p class="align-right">(주교회의 전례위원회 번역)</p>`},
                {id: 'aim_25', title: '2025년 희년 세계 평화를 위한 기도', content: `<p>주님, 저를 당신의 도구로 써주소서.<br>미움이 있는 곳에 사랑을,<br>다툼이 있는 곳에 용서를,<br>분열이 있는 곳에 일치를,<br>의혹이 있는 곳에 신앙을,<br>그릇됨이 있는 곳에 진리를,<br>절망이 있는 곳에 희망을,<br>어두움에 빛을,<br>슬픔이 있는 곳에 기쁨을 가져오는 자 되게 하소서.</p><p>위로받기보다는 위로하고,<br>이해받기보다는 이해하며,<br>사랑받기보다는 사랑하게 하여주소서.</p><p>우리는 줌으로써 받고,<br>용서함으로써 용서받으며,<br>자기를 버리고 죽음으로써<br>영생을 얻기 때문입니다. 아멘.</p><p class="align-right">(아시시의 성 프란치스코 ‘평화의 기도’)</p><br><p>삼위일체이신 하느님, 저희에게 평화를 주소서.<br>평화의 모후님, 세계 평화를 위하여 빌어주소서.<br>아멘.</p>`},
                {id: 'aim_24', title: '전례의 해 기도', content: `<p>하느님 아버지<br>성자의 강생과 파스카 신비로<br>구원의 문을 열어 주시고<br>성령을 보내시어 저희를 이끄시고 보호하시니<br>감사하나이다.</p><p>저희는 교구 설정 120주년과<br>조선교구 설정 200주년을 바라보면서<br>‘복음의 기쁨을 함께 살아가는 공동체’를 이루기 위해<br>말씀, 친교, 전례, 이웃사랑, 그리고 선교라는 핵심가치를<br>매 2년씩 중점적으로 실천하고자 하나이다.</p><p>전례의 해를 지내는 두 해 동안<br>아름답고 거룩한 전례로<br>하느님을 찬미하고<br>성사 안에 계시는 하느님과 더불어<br>일치의 기쁨을 누리려 하오니<br>저희가 주님 안에서 하나되어<br>영원한 생명의 길을 함께 걸어가게 하소서.</p><p>루르드의 복되신 동정 마리아님<br>저희와 저희 교구를 위하여 빌어주소서.<br>성 이윤일 요한과 한국의 모든 성인과 복자들이여<br>저희와 저희 교구를 위하여 빌어주소서.<br>아멘.</p><p class="align-right">천주교 대구대교구장 조환길 타대오 대주교 인준(2024.11.5)</p>`},
                {id: 'aim_23', title: '친교의 해 기도', content: `<p>삼위일체이신 하느님,<br>지난 ‘말씀의 해’를 통해 저희 교구에 베풀어 주신<br>모든 은혜에 감사드리나이다.</p><p>저희는 교구 설정 120주년과<br>조선교구 설정 200주년을 바라보면서<br>‘복음의 기쁨을 함께 살아가는 공동체’를 이루기 위해<br>말씀, 친교, 전례, 이웃사랑 그리고 선교라는 핵심 가치를<br>매 2년씩 중점적으로 실천하고자 하나이다.</p><p>두 번째 단계로서 ‘친교의 해’를 살아가며 청하오니<br>세상 모든 것을 창조하시고 섭리하시는 하느님의 사랑 안에서<br>서로를 향하고, 서로 함께하며, 서로를 위하는<br>친교의 신비를 드러냄으로써<br>복음의 기쁨을 함께 살아가는 공동체가 되게 하소서.</p><p>루르드의 복되신 동정 마리아님,<br>저희와 저희 교구를 위하여 빌어 주소서.<br>성 이윤일 요한과 한국의 모든 성인과 복자들이여,<br>저희와 저희 교구를 위하여 빌어 주소서.<br>아멘.</p><p class="align-right">천주교 대구대교구장 조환길 타대오 대주교 인준(2022.10.19)</p>`},
                {id: 'aim_22', title: '가경자 최양업 토마스 신부 시복 시성 기도', content: `<p>지극히 좋으신 하느님,<br>최양업 토마스 신부를 박해로 고통받는 교회의<br>든든한 목자로 세워 주셨음에 감사드리나이다.</p><p>모든 교우들이 오로지 하느님 자비에 희망을 두고<br>박해를 피해 산골 깊이 숨어 신앙을 지켜야 했던 시대에<br>최양업 토마스 신부는 주님을 닮은 착한 목자로<br>목숨이 다할 때까지 쉼 없이 양들을 찾아 복음을 전하고<br>주님께서 이루신 구원의 은총을 전했나이다.</p><p>자비로우신 하느님 아버지, 간절히 청하오니<br>가경자 최양업 토마스 신부에게 시복 시성의 은혜를 허락하시어<br>그에게 주셨던 굳건한 믿음과 온전한 헌신의 정신을 본받아<br>오늘 저희도 한마음으로 복음을 살고 전하는 일꾼이 되게 하소서.</p><p>저희는 가경자 최양업 신부의 시복 시성의 은총을 빌며<br>그의 전구에 힘입어 ( )를 위하여 기도드리오니 들어주소서.<br>우리 주 그리스도를 통하여 비나이다.<br>아멘.</p><p class="align-right">2022년 3월 23일 주교회의 2022년 춘계 정기총회 승인</p>`},
                {id: 'aim_21', title: '시노드를 위한 기도', content: `<p class="bold">‘주 성령님, 저희가 주님 앞에 있나이다’(Adsumus)</p><p>주 성령님,<br>저희가 주님의 이름으로 함께 모여<br>주님 앞에 있나이다.</p><p>주님만이 저희를 이끄시니 저희와 함께하시고<br>저희 마음에 머무소서.<br>저희가 나아갈 길을 보여 주시고<br>해야 할 일을 가르치소서.</p><p>나약한 죄인인 저희가 정의를 외면하여<br>혼란을 일으키지 않게 하시고<br>무지의 오류에 빠지지 않게 하소서.<br>또한 아무도 차별하지 않게 하소서.</p><p>저희가 주님 안에서 하나 되어<br>영원한 생명의 길을 함께 걸어가게 하시고<br>저희가 언제나 진리를 따르며<br>의로움을 찾게 하소서.</p><p>성부와 성자와 함께<br>영원히 친교를 이루시며<br>언제 어디서나 저희를 도우시는 성령께<br>이 모든 것을 간청하나이다.</p><p>아멘.</p>`},
                {id: 'aim_20', title: '말씀의 해 기도', content: `<p>좋으신 하느님 아버지,<br>그동안 저희 교구에 베풀어주신<br>모든 은혜에 감사드리나이다.</p><p>교구 설정 120주년을 바라보면서<br>복음의 기쁨을 함께 살아가는 공동체를 이루기 위해<br>말씀, 친교, 전례, 이웃사랑 그리고 선교라는 핵심가치를<br>매 2년씩 중점적으로 실천하고자 하나이다.</p><p>그 첫 단계로서 '말씀의 해'를 살아가며 청하오니<br>당신께서 말씀을 통해 세상을 창조하고<br>말씀을 통해 세상을 구원하셨으니<br>저희 모두가 당신 말씀에 가까이 다가가<br>말씀을 읽고, 쓰고, 나누고, 실천함으로써<br>복음의 기쁨을 함께 살아가는 공동체가 되게 하소서.</p><p>루르드의 복되신 동정 마리아님,<br>저희와 저희 교구를 위하여 빌어주소서.<br>성 이윤일 요한과 한국의 모든 성인과 복자들이여,<br>저희와 저희 교구를 위하여 빌어주소서.<br>아멘.</p><p class="align-right">천주교 대구대교구장 조환길(타대오) 대주교 인준 (2020.9.8.)</p>`},
                {id: 'aim_19', title: '성 김대건 안드레아 신부님 탄생 200주년 희년 기도', content: `<p>거룩하신 하느님,<br>하느님께서는 순교자들을 통하여 이 땅에 복음의 씨앗을 뿌려 주시고<br>특별히 김대건 안드레아를 부르시어<br>머나먼 타국에서 사제로 축성하시고<br>마침내 순교의 영광을 주셨으니 감사하나이다.</p><p>진리의 근원이신 하느님,<br>김대건 안드레아 사제처럼 온 마음을 다하여 하느님을 사랑하고<br>하느님께서 계시하신 진리를 굳게 믿으며<br>고통 속에서도 십자가의 길을 따랐던 순교의 삶을 본받아<br>저희가 어떠한 현세적인 어려움과 고통도 두려워하지 않고<br>용감하게 주님을 증언하도록 이끌어 주소서.</p><p>희망의 근원이신 하느님,<br>김대건 안드레아 사제가 고대하던 구원과 영원한 생명을 바라며<br>세상의 유혹을 거슬러 용기를 내고 자비의 삶을 살아<br>저희가 다른 이들과 화해하고, 가난하고 힘없는 이들을 도와주며<br>희년의 기쁨을 살게 하소서.</p><p>사랑의 근원이신 하느님,<br>김대건 안드레아 사제를 이 땅의 첫 사제로 불러 주셨듯이<br>훌륭한 사제와 수도자가 많이 나게 하시어<br>이 땅의 복음화와 세계 선교를 위하여 열정을 다하게 하시고<br>저희도 복음을 전하는 사랑의 일꾼으로 기쁘게 살아가게 하소서.<br>우리 주 그리스도를 통하여 비나이다. 아멘!</p><p>한국 교회의 수호자, 원죄 없이 잉태되신 복되신 동정 마리아님!<br>저희를 위하여 빌어 주소서.</p><p>성 김대건 안드레아와 한국의 모든 순교자!<br>저희를 위하여 빌어 주소서.</p><p class="align-right">* 주교회의 상임위원회 승인</p>`},
                {id: 'aim_18', title: '프란치스코 교황님의 성모님께 바치는 기도2', content: `<p>“천주의 성모님, 당신의 보호에 저희를 맡기나이다.”</p><p>천주의 성모님, 저희의 어머니,<br>전 세계가 고통과 불안에 시달리는 이 비참한 상황에서<br>당신의 보호에 저희를 맡기나이다.</p><p>동정 마리아님,<br>코로나바이러스의 전 세계적 확산 아래 놓여 있는 저희를 자애로이 굽어보소서.<br>사랑하는 이의 죽음에, 때로는 가슴이 미어지는 매장 방식에<br>상심하며 울고 있는 사람들을 위로하여 주소서.<br>앓고 있는 이들을 염려하면서도<br>확산 방지를 위해 가까이 있어 줄 수 없는 사람들에게 힘을 북돋워 주소서.<br>불확실한 미래를 염려하고,<br>경제와 일자리에 미칠 영향에 걱정하는 이들에게<br>희망을 불어넣어 주소서.</p><p>천주의 성모님, 저희의 어머니,<br>저희를 위하여 자비로운 아버지 하느님께 빌어 주시어,<br>이 모진 시련이 끝나고 희망과 평화가 새롭게 동트게 하소서.<br>카나의 혼인 잔치에서 그러하셨듯 거룩하신 당신 아드님께 청하시어,<br>환자와 희생자의 가족들이 성자께 위로를 받고<br>열린 마음으로 주님을 신뢰하게 하소서.</p><p>이 긴급 상황의 최일선에서 다른 이들을 구하고자<br>목숨의 위험도 마다하지 않는 의사와 간호사, 보건 종사자, 자원봉사자들을 보호하소서.<br>그들의 영웅적 노고에 함께하시고 그들에게 힘과 선의와 건강을 주소서.</p><p>밤낮으로 환자들을 돕는 사람들을 곁에서 돌보아 주시고,<br>복음에 충실히 따라 사목적 배려로<br>모든 이를 돕고 지원하는 사제들 곁에 함께해 주소서.</p><p>복되신 동정 성모님,<br>과학자들의 정신을 밝혀 주시어<br>그들이 이 바이러스를 물리칠 올바른 해결책을 찾게 하소서.</p><p>국가 지도자들을 도우시어,<br>그들이 지혜와 배려와 관용으로 생활필수품 부족에 시달리는 이들을 지원하고,<br>혜안과 연대로 사회적 경제적 해결 방안을 수립하게 하소서.</p><p>지극히 거룩하신 마리아님,<br>저희의 양심을 일깨워 주시어,<br>군비 증강과 확충에 사용된 막대한 자금이<br>방향을 바꾸어 앞으로 일어날 수 있는 재앙을 예방하는<br>적절한 연구 증진에 쓰일 수 있게 하소서.</p><p>사랑하는 어머니,<br>저희가 위대한 한 가정의 일원임을 깨닫고<br>저희를 하나 되게 하는 유대를 인식하여,<br>형제애와 연대의 정신으로 수많은 가난하고 비참한 상황에 도움이 되게 하소서.<br>확고한 믿음과 인내로운 봉사와 항구한 기도 안에 머물도록<br>저희에게 용기를 주소서.</p><p>근심하는 이들의 위안이신 마리아님,<br>곤경에 빠진 모든 당신 자녀를 보듬어 주시고 하느님께 간구해 주시어,<br>하느님의 전능하신 손길로<br>저희가 이 비참한 감염병 확산에서 해방되어<br>다시 일상의 평온한 삶을 되찾게 하소서.</p><p>너그러우시고 자애로우시며 아름다우신 동정 마리아님,<br>구원과 희망의 표징으로 저희 길을 밝혀 주시니 당신께 저희를 맡기나이다.<br>아멘.</p>`},
                {id: 'aim_17', title: '프란치스코 교황님의 성모님께 바치는 기도1', content: `<p>성모 마리아님,<br>언제나 구원과 희망의 표징으로<br>저희의 길을 밝혀 주소서.</p><p>병자의 치유이신 성모님,<br>늘 굳은 믿음을 간직하시어<br>십자가 아래에서 예수님의 고통에 함께하셨으니<br>저희도 성모님께 의탁하나이다.</p><p>저희의 구원이신 성모님,<br>갈릴래아 카나에서처럼<br>이 시련의 때가 지나고<br>다시 기쁨과 축제의 때가 찾아올 수 있도록<br>성모님께서는 저희에게 필요한 것을 아시고<br>마련해 주실 것을 믿나이다.</p><p>거룩한 사랑의 성모님,<br>저희가 아버지의 뜻을 충실히 따르고<br>예수님 말씀대로 행동할 수 있게 도와주소서.<br>예수님께서는 십자가를 통하여<br>몸소 저희의 고통을 짊어지시고 저희의 슬픔을 떠안으시어<br>저희를 부활의 기쁨으로 인도하셨나이다.</p><p>“천주의 성모님,<br>당신의 보호에 저희를 맡기오니<br>어려울 때에 저희의 간절한 기도를 외면하지 마시고<br>항상 모든 위험에서 저희를 구하소서.<br>영화롭고 복되신 동정녀시여.”</p><p>아멘.</p>`},
                {id: 'aim_16', title: '성 알퐁소 데 리구오리의 영적 영성체를 위한 기도2 (성체조배 중에)', content: `<p>예수 그리스도님!<br>당신께서 진실로 여기 성체 안에 계심을 믿나이다.<br>세상의 모든 것 위에 주님을 사랑하오며,<br>당신의 성체 영하기를 간절히 구하나이다.<br>지금 당장 주님 성체를 영할 수 없더라도,<br>제 영혼 영적으로만이라도 배부르게 하시옵소서.<br>주님 성체를 모실 때처럼<br>저를 주님께로 일치시키려 하오니<br>영원히, 당신 곁을 떠나지 않게 하시옵소서.</p>`},
                {id: 'aim_15', title: '성 알퐁소 데 리구오리의 영적 영성체를 위한 기도1 (‘묵주의 9일기도’ 중에서)', content: `<p>지극히 거룩한 성사 안에 참으로 계시는 우리 주 예수님,<br>지금 성체 안의 당신을 영할 수는 없사오나<br>지극한 사랑으로 간절히 바라오니,<br>거룩하신 당신 어머니의 티없으신 성심을 통해<br>영적으로 저의 마음에 오소서.<br>오셔서 영원토록 사시옵소서.<br>당신은 제 안에 계시고 저는 또 당신 안에서<br>이제와 또한 영원히 살게 하소서.</p>`},
                {id: 'aim_14', title: '코로나19 극복을 청하는 기도', content: `<p>자비로우신 하느님 아버지,</p><p>‘코로나19’ 확산으로 혼란과 불안 속에 있는<br>저희와 함께하여 주십시오.<br>어려움 속에서도 내적 평화를 잃지 않고<br>기도하도록 지켜주시고<br>각자의 삶의 자리에서<br>최선을 다할 수 있도록 이끌어주십시오.</p><p>‘코로나19’ 감염으로 고통 받는 이들에게<br>치유의 은총을 내려주시고,<br>이들을 헌신적으로 돌보고 있는<br>의료진들과 가족들을 축복하여 주십시오.<br>또한 이 병으로 세상을 떠난 분들의 영혼을 받아주시고,<br>유족들의 슬픔을 위로하여 주십시오.</p><p>국가 지도자들에게 지혜와 용기를 더해주시고,<br>현장에서 위험을 감수하며<br>투신하고 있는 관계자들을 보호해주십시오.<br>특별히 이런 상황에서 더 큰 위험에 노출되는<br>가난하고 소외된 사회적 약자들을<br>저희가 더 잘 돌볼 수 있도록 도와주십시오.</p><p>어려운 시기를 이겨내고자 애쓰는 저희 모두가<br>생명과 이웃의 존엄,<br>사랑과 연대의 중요성을 깊이 깨닫게 하시고<br>배려와 돌봄으로 희망을 나누는 공동체로<br>거듭나는 은총 내려주시길 간구합니다.</p><p>우리의 도움이신 성모님과 함께<br>우리 주 예수 그리스도를 통하여 비나이다. 아멘.</p><p class="align-right">한국 천주교 여자수도회 장상연합회 기도문<br>- 서울대교구장 인준 2020. 2. 26 -</p>`},
                {id: 'aim_13', title: '코로나19 사태로부터 보호를 청하는 기도', content: `<p>하느님 아버지,<br>많은 이들에게 영향을 미치고 있는 코로나바이러스감염증-19로부터<br>저희를 보호해주시길 청하며 당신께 나아갑니다.</p><p>이 질병의 성격과 원인을 연구하며<br>더 이상 전염되지 않도록 분투하고 있는 이들을 위한<br>당신의 도우심을 청합니다.</p><p>의료진들이 환자들을 잘 돌볼 수 있도록<br>능력과 연민을 더해주시고,<br>정부와 담당자들이 치료 방법과 이 사태에 대한 해결책을 찾도록,<br>이들의 마음과 손길에 함께해 주십시오.</p><p>또한 이 질병으로부터 고통 중에 있는<br>사람들의 쾌유를 위해 기도드리며,<br>모든 이의 선익을 위해 일하고<br>특별히 곤경 중에 있는 이들을 도울 수 있는 은총을<br>저희에게 내려주시길 간구합니다.</p><p>성부와 성령과 함께 영원히 살아 계시며 다스리시는 성자<br>우리 주 예수 그리스도를 통하여 비나이다. 아멘.</p><p>○ 모든 그리스도인의 도움이신 마리아,<br>◎ 저희를 위하여 빌어주소서.</p><p>○ 대천사 라파엘,<br>◎ 저희를 위하여 빌어주소서.</p><p class="align-right">- 2020년 1월 29일, 필리핀 주교회의 승인 -</p>`},
                {id: 'aim_12', title: '선교와 냉담교우 초대를 위한 기도', content: `<p>○ ‘만민에게 복음을 선포하라’ 하신 주님!<br>아직 당신을 알지 못하는 이들과<br>당신을 믿고 세례를 받았으나 교회를 떠나 있는<br>형제자매들을 생각하며 기도하나이다.</p><p>● 한 마음 한 뜻으로 여기 모인 저희들은<br>선한 의지로 하느님을 찾는 이들과<br>하느님을 모르고서 세상을 살아가는 이들에게<br>희망과 구원의 기쁜 소식을 전하며,<br>여러 가지 이유로 교회를 떠난 모든 이들에게는<br>용서와 화해의 손길을 건네고자 하나이다.</p><p>○ ‘길 잃은 양 한 마리를 찾아 나서는 목자’이신 주님!<br>저희가 그리스도를 본받고 그리스도의 말씀에 따라<br>한 영혼을 구원하는 데<br>저희의 모든 것을 아낌없이 바칠 수 있는<br>용기와 힘을 주소서.</p><p>● 저희가 부족하오나<br>언제나 주님의 말씀에 따라 살아가게 하시고<br>세상의 빛과 소금의 역할에 충실하게 하시며,<br>모두가 성령 안에 하나 되고<br>지혜와 말씀의 은사로 무장하여<br>적극적으로 선교를 실천할 은혜를 주소서.</p><p>◎ 사랑과 자비가 충만하신 주님!<br>비오니 당신을 모르는 이들에게<br>진리의 빛을 밝혀 주시고,<br>냉담 교우들의 아픔과 상처를 어루만져 주시어<br>그들이 당신 품안에서 기쁨과 평화를 누리게 하소서.</p><p>○ 루르드의 복되신 동정 마리아님,<br>● 저희 교구를 위하여 빌어주소서.<br>○ 성 이윤일 요한과 한국의 모든 성인과 복자들이여,<br>● 저희 교구를 위하여 빌어주소서.<br>◎ 아멘.</p><p class="align-right">(2018. 11. 26. 교구장 인준)</p>`},
                {id: 'aim_11', title: '장신호 요한보스코 보좌주교를 위한 기도', content: `<p>자비로우신 하느님 아버지<br>자비의 특별희년을 맞아 저희 대구대교구에<br>장신호 요한보스코 보좌주교를<br>새로운 목자로 세워주심에 감사드립니다.</p><p>주님, 비오니<br>그리스도의 구원활동에 협력하도록<br>당신 친히 세우신 주교에게<br>성령의 은혜를 더해 주시어<br>주님의 뜻에 충실한 착한 목자 되게 하시고<br>저희가 아버지의 나라를 이루어 가는 데에<br>참된 인도자가 되게 하소서.</p><p>자애로우신 주님<br>저희 모두가 새로운 목자와 더불어<br>사랑과 일치 안에서<br>하느님 자비의 참된 표지가 되고<br>새로운 복음화의 증인으로 살아가고자 하오니<br>당신의 은총으로 이끌어주시고 축복하여 주소서.</p><p>우리 주 그리스도를 통하여 비나이다. 아멘.</p>`},
                {id: 'aim_10', title: '자비의 희년에 바치는 기도', content: `<p>주님이신 예수 그리스도님,<br>주님께서는 저희에게 하늘에 계신 아버지와 같이 자비로워지라고 가르치시며<br>주님을 본 사람은 누구나 아버지를 뵌 것이라고 말씀하셨나이다.<br>저희에게 주님의 얼굴을 보여 주소서.<br>저희가 구원을 받으리이다.</p><p>주님께서는 사랑이 넘치는 눈길로<br>자캐오와 마태오를 돈의 종살이에서 풀어 주시고<br>피조물에서만 기쁨을 찾던 간음한 여인과 막달레나를 구원하셨으며<br>베드로가 배반을 한 뒤에 눈물을 흘리게 하시고<br>참회하는 강도에게 낙원을 약속하셨나이다.<br>“네가 하느님의 선물을 알았더라면!”<br>주님께서 사마리아 여인에게 하신 이 말씀을<br>저희 한 사람 한 사람이 듣게 해 주소서.</p><p>주님께서는 눈에 보이지 않으시는 아버지의 보이는 얼굴이시며<br>용서와 자비로 모든 이를 다스리시는 하느님의 얼굴이시니<br>이 세상에서 교회가<br>부활하시고 영광을 받으신 주님의 보이는 얼굴이 되게 하소서.</p><p>주님께서는 주님을 섬기는 이들도 나약함으로 갈아입고<br>무지와 잘못에 빠진 이들과 함께 아파하기를 바라셨으니<br>주님을 섬기는 이들을 만나는 모든 이가<br>하느님의 보살핌과 사랑과 용서를 받고 있음을 느끼게 해 주소서.</p><p>주님의 영을 보내시고 그 기름을 부어 주시어<br>저희 한 사람 한 사람을 거룩하게 하시며<br>자비의 희년이 주님의 은혜로운 해가 되어<br>주님의 교회가 새로운 열정으로<br>가난한 이들에게 기쁜 소식을 전하며<br>억압받는 이들과 갇힌 이들에게 해방을 선포하고<br>눈먼 이들을 다시 보게 해 주소서.</p><p>자비의 어머니이신 성모 마리아의 전구를 통하여 비나이다.<br>주님께서는 성부와 성령과 함께 영원히 살아 계시며 다스리시나이다.</p><p>아멘.</p>`},
                {id: 'aim_9', title: '우리의 지구를 위한 기도', content: `<p>전능하신 하느님,<br>하느님께서는 온 세계에 계시며<br>가장 작은 피조물 안에 계시나이다.<br>하느님께서 존재하는 모든 것을 온유로 감싸 안으시며<br>저희에게 사랑의 힘을 부어 주시어<br>저희가 생명과 아름다움을 보살피게 하소서.<br>또한 저희가 평화로 넘쳐 한 형제자매로 살아가며<br>그 누구에게도 해를 끼치지 않게 하소서.</p><p>오, 가난한 이들의 하느님,<br>저희를 도와주시어<br>저희가 하느님 보시기에 참으로 소중한 이들,<br>이 지구의 버림받고 잊힌 이들을 구하게 하소서.<br>저희 삶을 치유해 주시어<br>저희가 이 세상을 훼손하지 않고 보호하게 하시며<br>오염과 파괴가 아닌 아름다움의 씨앗을 뿌리게 하소서.<br>가난한 이들과 지구를 희생시키면서<br>이득만을 추구하는 이들의 마음을 움직여 주소서.</p><p>저희가 하느님의 영원한 빛으로 나아가는 여정에서<br>모든 것의 가치를 발견하고<br>경외로 가득 차 바라보며<br>모든 피조물과 깊은 일치를 이루고 있음을 깨닫도록<br>저희를 가르쳐 주소서.<br>하느님, 날마다 저희와 함께해 주시니 감사하나이다.<br>비오니, 정의와 사랑과 평화를 위한 투쟁에서<br>저희에게 힘을 주소서.</p>`},
                {id: 'aim_8', title: '그리스도인들이 피조물과 함께 드리는 기도', content: `<p>아버지,<br>전능하신 아버지의 손으로 빚으신<br>모든 피조물과 함께 찬미하나이다.<br>모든 피조물은 아버지의 것이고<br>아버지의 현존과 온유로 충만하나이다.<br>찬미받으소서!</p><p>하느님의 아드님이신 예수님,<br>주님에게서 만물이 창조되었나이다.<br>주님께서는 성모 마리아께 잉태되시어<br>이 땅에 속하시며<br>인간의 눈으로 이 세상을 바라보셨나이다.<br>주님께서는 오늘날에도 부활하신 분의 영광으로<br>모든 피조물 안에 살아 계시나이다.<br>찬미받으소서!</p><p>성령님, 성령님께서는 당신의 빛으로<br>이 세상을 아버지의 사랑으로 이끄시며<br>고통 가운데 신음하는 피조물과 함께하시나이다.<br>또한 성령님께서는 저희 마음 안에 머무르시며<br>저희를 선으로 이끄시나이다.<br>찬미받으소서!</p><p>삼위일체이신 주 하느님,<br>하느님께서는 한없는<br>사랑의 놀라운 친교를 이루는 분이시니<br>모든 것이 하느님을 이야기하는 세계의 아름다움 안에서<br>저희가 하느님을 바라보도록 가르쳐 주소서.<br>하느님께서 창조하신 모든 존재에 대하여<br>저희가 찬미와 감사를 드리도록 일깨워 주소서.<br>저희가 존재하는 모든 것과 내적 일치를 느끼도록<br>저희에게 은총을 내려 주소서.</p><p>사랑의 하느님,<br>이 세상에 저희에게 맞갖은 자리를 보여 주시어<br>저희가 이 땅에 있는 모든 것을 위한<br>하느님 사랑의 도구가 되게 하소서.<br>하느님께서 기억하지 않으시는 존재는<br>하나도 없기 때문이나이다.<br>권력과 재물을 소유한 이들을 깨우쳐 주시어<br>무관심의 죄를 짓지 않게 하시고<br>공동선에 호의적이며 약한 이들을 도와주고<br>저희가 살아가는 이 세상을 돌보게 하소서.<br>가난한 이들과 이 땅이 절규하고 있나이다.</p><p>주님,<br>주님의 힘과 빛으로 저희를 붙잡아 주시어<br>저희가 모든 생명을 보호하며<br>더 나은 미래를 마련하여<br>정의와 평화와 사랑과 아름다움의<br>하느님 나라가 오게 하소서.<br>찬미받으소서!<br>아멘.</p>`},
                {id: 'aim_7', title: '민족의 화해와 일치를 위한 기도', content: `<p>사람을 당신의 모습대로 지어내신 주님,<br>저희가 모두 주님을 닮게 하소서.</p><p>사랑으로 하나 되신 주님처럼<br>저희가 서로 사랑하여 하나 되게 하소서.</p><p>평화를 바라시는 주님,<br>이 나라 이땅에<br>잃어버린 평화를 되찾게 하소서.</p><p>한 핏줄 한 겨레이면서도 서로 헐뜯고 싸웠던<br>저희 잘못을 깨우쳐주소서.</p><p>분단의 깊은 상처를 낫게 하시고<br>서로 용서하는 화해의 은총을 내려주소서.</p><p>인류의 일치를 바라시는 주님,<br>갈라져 사는 저희 겨레의 아픔을 어루만져 주소서.</p><p>저희의 무관심을 깨닫게 하시어<br>겨레의 일치를 위하여 열심히 일하게 하시고<br>가진 바를 나누게 하소서.</p><p>서로 존중하고 사랑하며<br>평화 통일을 이룩하게 하소서.</p><p>온 겨레가 주님을 믿어<br>이땅에 주님의 나라를 이루게 하소서.<br>우리 주 그리스도를 통하여 비나이다.<br>아멘.</p><p>평화의 모후시여,<br>저희를 위하여 빌어주소서.<br>한국의 모든 순교 성인이여,<br>저희를 위하여 빌어주소서.</p>`},
                {id: 'aim_6', title: '시복 시성 기도문', content: `<p>○ 거룩하신 하느님 아버지!<br>저희 신앙의 선조인 순교자들과<br>증거자 최양업 토마스 사제에게<br>사랑과 성덕의 은혜를 베풀어 주심에 감사하나이다.</p><p>● 주님께서는 저희 순교자들에게<br>강한 믿음과 용덕의 은혜를 베푸시어<br>순교로 주님을 증거하게 하시고,<br>최양업 토마스 사제에게는<br>복음 선포의 열정을 주시어 주님을 현양하게 하셨나이다.</p><p>◎ 자애로우신 주님!<br>간절히 청하오니,<br>저희 신앙의 선조인<br>복자 윤지충 바오로와 동료 123위에게 시성의 영예를 허락하시고<br>가경자 최양업 토마스 사제,<br>하느님의 종 이벽 요한 세례자와 동료 132위,<br>하느님의 종 홍용호 프란치스코 보르지아 주교와 동료 80위,<br>하느님의 종 신상원 보니파시오 사우어 아빠스와 동료 37위에게는<br>시복의 영광을 허락하시어,<br>후손인 저희들이 그들을 본받아 신앙을 굳건히 지키며<br>복음의 증인으로 살아갈 수 있도록<br>은총 내려주소서.<br>우리 주 그리스도를 통하여 비나이다. 아멘.</p><p>○ 천주의 성모 마리아님!<br>● 저희를 위하여 빌어 주소서!<br>○ 한국의 모든 성인 성녀와 복자님!<br>● 저희를 위하여 빌어 주소서!</p><p class="align-right">- 주교회의 2014년 추계 정기총회 승인 -<br>- 주교회의 2017년 추계 정기총회: ‘복자님’ 추가 승인<br>- 주교회의 상임위원회 2022년 7월 12일 회의: ‘하느님 종 최양업 토마스 사제’를 ‘가경자 최양업 토마스 사제’로 수정 승인</p>`},
                {id: 'aim_5', title: '새로운 100년을 시작하며 바치는 기도문', content: `<p>지극히 거룩하신 하느님 아버지,<br>손수 이끌어 오신 저희 교구가<br>이제 새로운 100년의 첫걸음을 내딛나이다.<br>저희 교구를 자비로이 굽어보시고<br>당신의 성령을 보내시어<br>저희 마음을 새롭게 하소서.</p><p>모든 선의 근원이신 아버지,<br>저희가 선조들의 신앙을 이어받아<br>새 시대, 새 복음화의 초석이 될 제 2차 교구 시노드와<br>100주년 기념 성전 건립에<br>한 마음으로 동참하게 하시고<br>청소년들과 소외된 이들을 위해 헌신하게 하시어<br>저희들이 아버지께 바친 다짐을<br>오롯이 실천하도록 이끌어주소서.</p><p>인자하신 하느님 아버지,<br>당신의 크신 사랑에 의탁하며 청하오니<br>새 시대를 향해 출발하는 저희에게 강복하시어<br>몸소 세워주신 목자와 더불어<br>길이 남을 열매를 맺게 하소서.</p><p>우리 주 예수 그리스도를 통하여 비나이다. 아멘.</p>`},
                {id: 'aim_4', title: '교구설정 100주년 기도문', content: `<p>좋으신 하느님 아버지,<br>그동안 우리 교구에 베풀어주신<br>당신 사랑에 감사드리나이다.</p><p>기묘한 방법으로 이 땅에 복음이 전해진 이래<br>우리 교구는 2011년 교구설정 100주년을<br>맞이하였나이다.<br>저희들이 준비하는 제2차 교구 시노드와<br>100주년 기념 성전 건립,<br>그리고 교구 100년사 편찬을 통하여<br>우리 교구가 ‘다시 새롭게’ 도약할 수 있도록<br>강복하여 주시고<br>이 모든 일이 당신께 영광이 되게 하소서.</p><p>자비로우신 하느님 아버지,<br>저희 마음에 사랑의 불을 놓으시어<br>교구민 모두가 복음정신으로 충만하여<br>교구의 모든 일에 기꺼이 동참하게 하시고<br>한 목자 아래 하나 되어<br>세상 복음화에 헌신하게 하소서.</p><p>우리 주 그리스도를 통하여 비나이다.<br>아멘.</p>`},
                {id: 'aim_3', title: '이윤일 요한 성인께 바치는 기도', content: `<p>하느님 아버지,<br>이윤일 요한 성인을 저희에게 보내주셨으니<br>찬미와 감사를 드리나이다.</p><p>당신께서는 이윤일 요한을 택하시어,<br>여우목에서 전교회장의 직분을 성실하게 수행하게 하셨고,<br>상주 감옥에 갇힌 이들의 모범이 되게 하셨으며,<br>관덕정에서 순교의 월계관을 씌워 주심으로써<br>영광스러운 성인의 반열에 올려주셨나이다.</p><p>이제 저희는<br>대구대교구의 주보이신 성모님과 성인을 본받아<br>하느님을 모르는 이들에게는 복음을 전하고<br>신앙생활에 지친 이들에게는 위로와 용기를 주며<br>세상 안에서는 당당하게 신앙을 고백하려 하나이다.</p><p>하오니,<br>주님의 은총 안에서 신앙의 증거자가 되도록<br>성인께서는 저희를 위하여 빌어주소서.<br>아멘.</p><p class="align-right">교구장 최영수 (요한) 대주교 인준</p>`}
            ],
            'basic': [
                {id: 'basic_14', title: '성호경', content: `<span class="rubric">십자성호를 그으며</span><p>성부와 성자와 성령의 이름으로.</p><p>아멘.</p>`},
                {id: 'basic_15', title: '주님의 기도', content: `<p>하늘에 계신 우리 아버지,</p><p>아버지의 이름이 거룩히 빛나시며</p><p>아버지의 나라가 오시며</p><p>아버지의 뜻이 하늘에서와 같이<br>땅에서도 이루어지소서!</p><p>오늘 저희에게 일용할 양식을 주시고</p><p>저희에게 잘못한 이를 저희가 용서하오니</p><p>저희 죄를 용서하시고</p><p>저희를 유혹에 빠지지 않게 하시고<br>악에서 구하소서.</p><p>아멘.</p>`},
                {id: 'basic_16', title: '성모송', content: `<p>은총이 가득하신 마리아님, 기뻐하소서!</p><p>주님께서 함께 계시니 여인 중에 복되시며</p><p>태중의 아들 예수님 또한 복되시나이다.</p><p>천주의 성모 마리아님,</p><p>이제와 저희 죽을 때에<br>저희 죄인을 위하여 빌어주소서.</p><p>아멘.</p>`},
                {id: 'basic_17', title: '영광송', content: `<span class="rubric">밑줄 부분에서 고개를 숙이며</span><p><span class="bold"><u>영광이 성부와 성자와 성령께</u></span></p><p>처음과 같이 이제와 항상 영원히.</p><p>아멘.</p>`},
                {id: 'basic_18', title: '사도신경', content: `<p>전능하신 천주 성부<br>천지의 창조주를 저는 믿나이다.</p><p>그 외아들 우리 주 예수 그리스도님</p><span class="rubric">밑줄 부분에서 고개를 깊이 숙인다.</span><p><span class="bold"><u>성령으로 인하여 동정 마리아께 잉태되어 나시고</u></span></p><p>본시오 빌라도 통치 아래서 고난을 받으시고</p><p>십자가에 못박혀 돌아가시고 묻히셨으며</p><p>저승에 가시어 사흗날에 죽은 이들 가운데서 부활하시고</p><p>하늘에 올라 전능하신 천주 성부 오른편에 앉으시며</p><p>그리로부터 산 이와 죽은 이를 심판하러 오시리라 믿나이다.</p><p>성령을 믿으며</p><p>거룩하고 보편된 교회와 모든 성인의 통공을 믿으며</p><p>죄의 용서와 육신의 부활을 믿으며 영원한 삶을 믿나이다.</p><p>아멘.</p>`},
                {id: 'basic_19', title: '니케아-콘스탄티노폴리스 신경', content: `<p><span class="symbol">†</span> 한 분이신 하느님을<br>◎ 저는 믿나이다.</p><p>전능하신 아버지,<br>하늘과 땅과 유형무형한 만물의 창조주를 믿나이다.</p><p>또한 한 분이신 주 예수 그리스도, 하느님의 외아들<br>영원으로부터 성부에게서 나신 분을 믿나이다.</p><p>하느님에게서 나신 하느님, 빛에서 나신 빛<br>참 하느님에게서 나신 참 하느님으로서,<br>창조되지 않고 나시어<br>성부와 한 본체로서 만물을 창조하셨음을 믿나이다.</p><p>성자께서는 저희 인간을 위하여, 저희 구원을 위하여<br>하늘에서 내려오셨음을 믿나이다.</p><span class="rubric">(밑줄 부분에서 모두 고개를 깊이 숙인다.)</span><p><span class="bold"><u>또한 성령으로 인하여 동정 마리아에게서 육신을 취하시어 사람이 되셨음을 믿나이다.</u></span></p><p>본시오 빌라도 통치 아래서 저희를 위하여<br>십자가에 못박혀 수난하고 묻히셨으며<br>성서 말씀대로 사흗날에 부활하시어<br>하늘에 올라 성부 오른편에 앉아계심을 믿나이다.</p><p>그분께서는 산 이와 죽은 이를 심판하러<br>영광 속에 다시 오시리니<br>그분의 나라는 끝이 없으리이다.</p><p>또한 주님이시며 생명을 주시는 성령을 믿나이다.</p><p>성령께서는 성부와 성자에게서 발하시고<br>성부와 성자와 더불어 영광과 흠숭을 받으시며<br>예언자들을 통하여 말씀하셨나이다.</p><p>하나이고 거룩하고 보편되며<br>사도로부터 이어오는 교회를 믿나이다.</p><p>죄를 씻는 유일한 세례를 믿으며<br>죽은 이들의 부활과 내세의 삶을 기다리나이다.</p><p>아멘.</p>`},
                {id: 'basic_20', title: '반성기도', content: `<p>주님, 오늘 생각과 말과 행위로 지은 죄와</p><p>의무를 소홀히 한 죄를 자세히 살피고</p><p>그 가운데 버릇이 된 죄를 깨닫게 하소서.</p><p>아멘.</p>`},
                {id: 'basic_21', title: '십계명', content: `<p>일. 한 분이신 하느님을 흠숭하여라.</p><p>이. 하느님의 이름을 함부로 부르지 마라.</p><p>삼. 주일을 거룩히 지내라.</p><p>사. 부모에게 효도하여라.</p><p>오. 사람을 죽이지 마라.</p><p>육. 간음하지 마라.</p><p>칠. 도둑질을 하지 마라.</p><p>팔. 거짓 증언을 하지 마라.</p><p>구. 남의 아내를 탐내지 마라.</p><p>십. 남의 재물을 탐내지 마라.</p>`},
                {id: 'basic_22', title: '고백기도', content: `<p>전능하신 하느님과 형제들에게 고백하오니<br>생각과 말과 행위로 죄를 많이 지었으며<br>자주 의무를 소홀히 하였나이다.</p><p><span class="rubric">가슴을 치며</span> 제 탓이요<br><span class="rubric">가슴을 치며</span> 제 탓이요<br><span class="rubric">가슴을 치며</span> 저의 큰 탓이옵니다.</p><p>그러므로 간절히 바라오니<br>평생 동정이신 성모 마리아와<br>모든 천사와 성인과 형제들은<br>저를 위하여 하느님께 빌어주소서.</p><p>(<span class="symbol">†</span> 전능하신 하느님, 저희에게 자비를 베푸시어<br>죄를 용서하시고 영원한 생명으로 이끌어주소서.)</p><p>아멘.</p>`},
                {id: 'basic_23', title: '통회기도', content: `<p>하느님,<br>제가 죄를 지어<br>참으로 사랑받으셔야 할 주님의 마음을 아프게 하였기에<br>악을 저지르고 선을 멀리한 모든 잘못을<br>진심으로 뉘우치나이다.</p><p>하느님의 은총으로 속죄하고<br>다시는 죄를 짓지 않으며<br>죄지을 기회를 피하기로 굳게 다짐하오니<br>우리 구세주 예수 그리스도의 수난 공로를 보시고<br>저에게 자비를 베풀어주소서.</p><p>아멘.</p>`},
                {id: 'basic_24', title: '삼덕송', content: `<p><span class="rubric">신덕송</span></p><p>하느님, 하느님께서는 진리의 근원이시며<br>그르침이 없으시므로<br>계시하신 진리를<br>교회가 가르치는 대로 굳게 믿나이다.</p><br><p><span class="rubric">망덕송</span></p><p>하느님, 하느님께서는 자비의 근원이시며<br>저버림이 없으시므로<br>예수 그리스도의 공로를 통하여 주실<br>구원의 은총과 영원한 생명을 바라나이다.</p><br><p><span class="rubric">애덕송</span></p><p>하느님, 하느님께서는 사랑의 근원이시며<br>한없이 좋으시므로<br>마음을 다하여 주님을 사랑하며<br>이웃을 제 몸같이 사랑하나이다.</p>`},
                {id: 'basic_25', title: '봉헌기도', content: `<p>하느님, 저를 사랑으로 내시고<br>저에게 영혼 육신을 주시어<br>주님만을 섬기고 사람을 도우라 하셨나이다.</p><p>저는 비록 죄가 많사오나<br>주님께 받은 몸과 마음을 오롯이 도로 바쳐<br>찬미와 봉사의 제물로 드리오니<br>어여삐 여기시어 받아주소서.</p><p>아멘.</p>`},
                {id: 'basic_26', title: '삼종기도', content: `<p>○ 주님의 천사가 마리아께 아뢰니<br>● 성령으로 잉태하셨나이다</p><p><span class="rubric">성모송</span></p><p>○ "주님의 종이오니<br>● 그대로 제게 이루어지소서!"</p><p><span class="rubric">성모송</span></p><p>○ 이에 말씀이 사람이 되시어<br>● 저희 가운데 계시나이다.</p><p><span class="rubric">성모송</span></p><p>천주의 성모님, 저희를 위하여 빌어주시어<br>그리스도께서 약속하신 영원한 생명을 얻게 하소서.</p><p><span class="symbol">†</span> 기도합시다.<br>하느님, 천사의 아룀으로<br>성자께서 사람이 되심을 알았으니<br>성자의 수난과 십자가로<br>부활의 영광에 이르는 은총을<br>저희에게 내려주소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p>`},
                {id: 'basic_27', title: '부활 삼종기도', content: `<span class="rubric">(예수 부활 대축일부터 성령 강림 대축일까지)</span><p>○ 하늘의 모후님, 기뻐하소서. 알렐루야.<br>● 태중에 모시던 아드님께서, 알렐루야.<br>○ 말씀하신 대로 부활하셨나이다. 알렐루야.<br>● 저희를 위하여 하느님께 빌어주소서. 알렐루야.</p><p>○ 동정 마리아님, 기뻐하시며 즐거워하소서. 알렐루야.<br>● 주님께서 참으로 부활하셨나이다. 알렐루야.</p><p><span class="symbol">†</span> 기도합시다.<br>하느님, 성자 우리 주 예수 그리스도의 부활로<br>온 세상을 기쁘게 하셨으니<br>성자의 어머니 동정 마리아의 도움으로<br>영생의 즐거움을 얻게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p>`},
                {id: 'basic_28', title: '묵주기도', content: `<p><span class="rubric">환희의 신비</span></p><p><span class="bold">1단</span> 마리아께서 예수님을 잉태하심을 묵상합시다.<br><span class="bold">2단</span> 마리아께서 엘리사벳을 찾아보심을 묵상합시다.<br><span class="bold">3단</span> 마리아께서 예수님을 낳으심을 묵상합시다.<br><span class="bold">4단</span> 마리아께서 예수님을 성전에 바치심을 묵상합시다.<br><span class="bold">5단</span> 마리아께서 잃으셨던 예수님을 성전에서 찾으심을 묵상합시다.</p><p><span class="rubric">빛의 신비</span></p><p><span class="bold">1단</span> 예수님께서 세례받으심을 묵상합시다.<br><span class="bold">2단</span> 예수님께서 가나에서 첫 기적을 행하심을 묵상합시다.<br><span class="bold">3단</span> 예수님께서 하느님 나라를 선포하심을 묵상합시다.<br><span class="bold">4단</span> 예수님께서 거룩하게 변모하심을 묵상합시다.<br><span class="bold">5단</span> 예수님께서 성체성사를 세우심을 묵상합시다.</p><p><span class="rubric">고통의 신비</span></p><p><span class="bold">1단</span> 예수님께서 우리를 위하여 피땀 흘리심을 묵상합시다.<br><span class="bold">2단</span> 예수님께서 우리를 위하여 매맞으심을 묵상합시다.<br><span class="bold">3단</span> 예수님께서 우리를 위하여 가시관 쓰심을 묵상합시다.<br><span class="bold">4단</span> 예수님께서 우리를 위하여 십자가 지심을 묵상합시다.<br><span class="bold">5단</span> 예수님께서 우리를 위하여 십자가에 못박혀 돌아가심을 묵상합시다.</p><p><span class="rubric">영광의 신비</span></p><p><span class="bold">1단</span> 예수님께서 부활하심을 묵상합시다.<br><span class="bold">2단</span> 예수님께서 승천하심을 묵상합시다.<br><span class="bold">3단</span> 예수님께서 성령을 보내심을 묵상합시다.<br><span class="bold">4단</span> 예수님께서 마리아를 하늘에 불러올리심을 묵상합시다.<br><span class="bold">5단</span> 예수님께서 마리아께 천상 모후의 관을 씌우심을 묵상합시다.</p><p><br><span class="bold">구원을 비는 기도</span></p><p>예수님, 저희 죄를 용서하시며<br>저희를 지옥 불에서 구하시고<br>연옥 영혼을 돌보시며<br>가장 버림받은 영혼을 돌보소서.</p>`},
                {id: 'basic_29', title: '식사 전 기도', content: `<p><span class="symbol">†</span> 주님, 은혜로이 내려주신 이 음식과<br>저희에게 강복하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p>`},
                {id: 'basic_30', title: '식사 후 기도', content: `<p><span class="symbol">†</span> 전능하신 하느님,<br>저희에게 베풀어주신 모든 은혜에 감사하나이다.</p><p>◎ 아멘.</p><br><p><span class="symbol">†</span> 주님의 이름은 찬미를 받으소서.</p><p>◎ 이제와 영원히 받으소서.</p><br><p><span class="symbol">†</span> 세상을 떠난 모든 이가<br>하느님의 자비로 평화의 안식을 얻게 하소서.</p><p>◎ 아멘.</p>`},
                {id: 'basic_31', title: '일을 시작하며 바치는 기도', content: `<p>○ 오소서, 성령님.<br>저희 마음을 성령으로 가득 채우시어<br>저희 안에 사랑의 불이 타오르게 하소서.</p><p>● 주님의 성령을 보내소서. 저희가 새로워지리이다.<br>또한 온 누리가 새롭게 되리이다.</p><p><span class="symbol">†</span> 기도합시다.<br>하느님, 성령의 빛으로 저희 마음을 이끄시어<br>바르게 생각하고<br>언제나 성령의 위로를 받아 누리게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘</p>`},
                {id: 'basic_32', title: '일을 마치고 바치는 기도', content: `<span class="rubric">(성모님께 보호를 청하는 기도)</span><p>○ 천주의 성모님, 당신의 보호에 저희를 맡기오니<br>어려울 때에 저희의 간절한 기도를 외면하지 마시고<br>항상 모든 위험에서 언제나 저희를 구하소서.<br>영화롭고 복되신 동정녀시여.</p>`},
                {id: 'basic_33', title: '아침기도', content: `<p><span class="rubric">십자성호를 그으며</span></p><p><span class="symbol">†</span> 성부와 성자와 성령의 이름으로.</p><p>◎ 아멘.</p><br><p>○ 하늘에 계신 우리 아버지.<br>아버지의 이름이 거룩히 빛나시며<br>아버지의 나라가 오시며<br>아버지의 뜻이 하늘에서와 같이<br>땅에서도 이루어지소서!</p><p>● 오늘 저희에게 일용할 양식을 주시고<br>저희에게 잘못한 이를 저희가 용서하오니<br>저희 죄를 용서하시고<br>저희를 유혹에 빠지지 않게 하시고<br>악에서 구하소서.</p><p>◎ 아멘.</p><br><p>◎ 하느님, 저를 사랑으로 내시고<br>저에게 영혼 육신을 주시어<br>주님만을 섬기고 사람을 도우라 하셨나이다.<br>저는 비록 죄가 많사오나<br>주님께 받은 몸과 마음을 오롯이 도로 바쳐<br>찬미와 봉사의 제물로 드리오니<br>어여삐 여기시어 받아주소서.<br>아멘.</p><br><p><span class="symbol">†</span> 우리 주 하느님께 권능과 영광<br>지혜와 굳셈이 있사오니<br>찬미와 감사와 흠숭을 영원히 받으소서.</p><p>◎ 아멘.</p><br><p><span class="symbol">†</span> 전능하신 하느님,<br>오늘도 저희 생각과 말과 행위를<br>주님의 평화로 이끌어주소서.</p><p>◎ 아멘.</p>`},
                {id: 'basic_34', title: '저녁기도', content: `<p><span class="rubric">십자성호를 그으며</span></p><p><span class="symbol">†</span> 성부와 성자와 성령의 이름으로.</p><p>◎ 아멘.</p><br><p><span class="symbol">†</span> 주님, 오늘 생각과 말과 행위로 지은 죄와<br>의무를 소홀히 한 죄를 자세히 살피고<br>그 가운데 버릇이 된 죄를 깨닫게 하소서.</p><span class="rubric">잠깐 반성한다.</span><br><p>◎ 하느님,<br>제가 죄를 지어<br>참으로 사랑받으셔야 할 하느님의 마음을 아프게 하였기에<br>악을 저지르고 선을 멀리한 모든 잘못을<br>진심으로 뉘우치나이다.<br>하느님의 은총으로 속죄하고<br>다시는 죄를 짓지 않으며<br>죄지을 기회를 피하기로 굳게 다짐하오니<br>우리 구세주 예수 그리스도의 수난 공로를 보시고<br>저에게 자비를 베풀어주소서.<br>아멘.</p><br><p>○ 하느님, 하느님께서는 진리의 근원이시며<br>그르침이 없으시므로<br>계시하신 진리를<br>교회가 가르치는 대로 굳게 믿나이다.</p><p>● 하느님, 하느님께서는 자비의 근원이시며<br>저버림이 없으시므로<br>예수 그리스도의 공로를 통하여 주실<br>구원의 은총과 영원한 생명을 바라나이다.</p><p>○ 하느님, 하느님께서는 사랑의 근원이시며<br>한없이 좋으시므로<br>마음을 다하여 주님을 사랑하며<br>이웃을 제 몸같이 사랑하나이다</p><br><p><span class="symbol">†</span> 하늘에 계신 우리 아버지, 오늘 하루도 이미 저물었나이다.<br>이제 저희는 구세주 예수 그리스도를 통하여<br>모든 천사와 성인과 함께 주님을 흠숭하며<br>지금 이 순간까지 베풀어 주신<br>주님의 사랑에 감사하나이다.</p><p>◎ 아멘.</p><br><p><span class="symbol">†</span> 전능하신 천주<br><span class="rubric">십자성호를 그으며</span><br>성부와 성자와 성령께서는<br>저희에게 강복하시고 지켜주소서.</p><p>◎ 아멘.</p>`},
                {id: 'basic_35', title: '고해성사', content: `<span class="rubric">1. 먼저, 지은 죄를 모두 알아내고</span><span class="rubric">2. 진정으로 뉘우치며</span><span class="rubric">3. 다시는 죄를 짓지 않기로 굳게 결심하고</span><span class="rubric">4. "고백기도"와 "통회기도"를 바친다.</span><br><p><span class="rubric">십자성호를 그으며</span></p><p>● 성부와 성자와 성령의 이름으로.</p><p>아멘.</p><br><p><span class="symbol">†</span> 하느님께서 우리 마음을 비추어 주시니<br>하느님의 자비를 굳게 믿으며<br>그동안 지은 죄를 사실대로 고백하십시오.</p><p>● 아멘.</p><br><p>● 고해한 지 <span class="rubric">(몇 일, 몇 주일, 몇 달)</span> 됩니다.</p><p><span class="rubric">알아낸 죄를 낱낱이 고백한다.</span></p><br><p><span class="rubric">죄를 고백한 다음</span></p><p>● 이 밖에 알아내지 못한 죄도<br>모두 용서하여 주십시오.</p><br><p><span class="rubric">사제는 고백자에게 훈계하고 보속을 준다.</span></p><p><span class="rubric">필요하다면 고백자에게 다음 통회기도를 바치게 할 수 있다.</span></p><br><p>● 하느님,<br>제가 죄를 지어<br>참으로 사랑받으셔야 할 주님의 마음을 아프게 하였기에<br>악을 저지르고 선을 멀리한 모든 잘못을<br>진심으로 뉘우치나이다.<br>하느님의 은총으로 속죄하고<br>다시는 죄를 짓지 않으며<br>죄지을 기회를 피하기로 굳게 다짐하오니<br>우리 구세주 예수 그리스도의 수난 공로를 보시고<br>저에게 자비를 베풀어주소서.</p><br><p><span class="rubric">사제는 고백자 머리 위에 두 손이나 오른손을 펴 들고 사죄경을 외운다.</span></p><br><p><span class="symbol">†</span> 인자하신 천주 성부께서는<br>성자의 죽음과 부활로<br>세상을 당신과 화해시키시고<br>죄를 용서하시려고 성령을 보내주셨으니<br>교회의 직무를 통하여<br>몸소 이 교우에게 용서와 평화를 주소서.</p><p>나는 성부와 ╋ 성자와 성령의 이름으로<br>이 교우의 죄를 용서합니다.</p><p>● 아멘</p><br><p><span class="symbol">†</span> 주님은 좋으신 분이시니 찬미합시다.</p><p>● 주님의 자비는 영원하시다.</p><br><p><span class="symbol">†</span> 주님께서 죄를 용서해 주셨습니다.<br>평화로이 가십시오.</p><p>● 감사합니다.</p>`}

                {id: 'special_17', title: '성모 호칭 기도', content: `<p>○ 주님, 자비를 베푸소서.<br>● 주님, 자비를 베푸소서.</p><p>○ 그리스도님, 자비를 베푸소서.<br>● 그리스도님, 자비를 베푸소서.</p><p>○ 주님, 자비를 베푸소서.<br>● 주님, 자비를 베푸소서.</p><p>○ 그리스도님, 저희의 기도를 들으소서.<br>● 그리스도님, 저희의 기도를 들으소서.</p><p>○ 그리스도님, 저희의 기도를 들어주소서.<br>● 그리스도님, 저희의 기도를 들어주소서.</p><p>○ 하늘에 계신 천주 성부님<br>● 자비를 베푸소서.</p><br><p><span class="rubric">다음은 같은 후렴</span></p><p>○ 세상을 구원하신 천주 성자님<br>○ 천주 성령님<br>○ 삼위일체이신 하느님<br>○ 성모 마리아님<br>● 저희를 위하여 빌어주소서.</p><br><p><span class="rubric">다음은 같은 후렴</span></p><p>○ 천주의 성모님<br>○ 지극히 거룩하신 동정녀<br>○ 그리스도의 어머니<br>○ 교회의 어머니<br>○ 자비의 어머니<br>○ 천상 은총의 어머니<br>○ 희망의 어머니<br>○ 지극히 깨끗하신 어머니<br>○ 순결하신 어머니<br>○ 평생 동정이신 어머니<br>○ 티없으신 어머니<br>○ 사랑하올 어머니<br>○ 탄복하올 어머니<br>○ 슬기로우신 어머니<br>○ 창조주의 어머니<br>○ 구세주의 어머니<br>○ 지극히 지혜로우신 동정녀<br>○ 공경하올 동정녀<br>○ 찬송하올 동정녀<br>○ 든든한 힘이신 동정녀<br>○ 인자하신 동정녀<br>○ 성실하신 동정녀<br>○ 정의의 거울<br>○ 상지의 옥좌<br>○ 즐거움의 샘<br>○ 신비로운 그릇<br>○ 존경하올 그릇<br>○ 지극한 사랑의 그릇<br>○ 신비로운 장미<br>○ 다윗의 망대<br>○ 상아 탑<br>○ 황금 궁전<br>○ 계약의 궤<br>○ 하늘의 문<br>○ 샛별<br>○ 병자의 치유<br>○ 죄인의 피신처<br>○ 이주민의 위로<br>○ 근심하는 이의 위안<br>○ 신자들의 도움<br>○ 천사의 모후<br>○ 성조의 모후<br>○ 예언자의 모후<br>○ 사도의 모후<br>○ 순교자의 모후<br>○ 증거자의 모후<br>○ 동정녀의 모후<br>○ 모든 성인의 모후<br>○ 원죄없이 잉태되신 모후<br>○ 하늘에 올림을 받으신 모후<br>○ 묵주기도의 모후<br>○ 가정의 모후<br>○ 평화의 모후</p><p>○ 하느님의 어린양, 세상의 죄를 없애시는 주님<br>● 저희를 용서하소서.</p><p>○ 하느님의 어린양, 세상의 죄를 없애시는 주님<br>● 저희의 기도를 들어주소서.</p><p>○ 하느님의 어린양, 세상의 죄를 없애시는 주님<br>● 자비를 베푸소서.</p><p>○ 천주의 성모님, 저희를 위하여 빌어주시어<br>● 그리스도께서 약속하신 영원한 생명을 얻게 하소서.</p><br><p><span class="symbol">†</span> 기도합시다.<br>주 하느님,<br>저희에게 은총을 베푸시고<br>복되신 평생 동정 마리아의 전구로<br>이 세상의 슬픔에서 벗어나<br>영원한 기쁨을 누리게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p>`},
                {id: 'special_16', title: '예수 성심 호칭 기도', content: `<p>○ 주님, 자비를 베푸소서.<br>● 주님, 자비를 베푸소서.</p><p>○ 그리스도님, 자비를 베푸소서.<br>● 그리스도님, 자비를 베푸소서.</p><p>○ 주님, 자비를 베푸소서.<br>● 주님, 자비를 베푸소서.</p><p>○ 그리스도님, 저희의 기도를 들으소서.<br>● 그리스도님, 저희의 기도를 들으소서.</p><p>○ 그리스도님, 저희의 기도를 들어주소서.<br>● 그리스도님, 저희의 기도를 들어주소서.</p><p>○ 하늘에 계신 천주 성부님<br>● 자비를 베푸소서.</p><br><p><span class="rubric">다음은 같은 후렴</span></p><p>○ 세상을 구원하신 천주 성자님<br>○ 천주 성령님<br>○ 삼위일체이신 하느님<br>○ 영원하신 성부의 아들이신 예수 성심<br>○ 동정 마리아 몸에 성령으로 잉태되신 예수 성심<br>○ 하느님의 말씀이신 예수 성심<br>○ 영광과 위엄이 가득하신 예수 성심<br>○ 하느님의 성전이신 예수 성심<br>○ 지존하신 이의 장막이신 예수 성심<br>○ 하느님의 집이요 하늘의 문이신 예수 성심<br>○ 사랑의 불가마이신 예수 성심<br>○ 나눔과 베품의 그릇이신 예수 성심<br>○ 자비와 인정이 넘치시는 예수 성심<br>○ 모든 덕행의 원천이신 예수 성심<br>○ 지극한 찬미를 받으실 예수 성심<br>○ 모든 마음의 중심이요 임금이신 예수 성심<br>○ 온갖 지혜와 지식의 보고이신 예수 성심<br>○ 천주성이 충만하신 예수 성심<br>○ 성부의 기쁨이신 예수 성심<br>○ 풍부한 은혜를 베푸시는 예수 성심<br>○ 죽은 이들의 희망이신 예수 성심<br>○ 지극히 자비로우시고 인내하시는 예수 성심<br>○ 모든 이의 간구를 들어주시는 예수 성심<br>○ 생명과 성덕의 샘이신 예수 성심<br>○ 저희 죄를 용서하시는 예수 성심<br>○ 극도의 모욕을 당하신 예수 성심<br>○ 저희 죄로 찢기신 예수 성심<br>○ 죽기까지 순명하신 예수 성심<br>○ 창에 찔리신 예수 성심<br>○ 모든 위로의 샘이신 예수 성심<br>○ 생명이요 부활이신 예수 성심<br>○ 평화요 화해이신 예수 성심<br>○ 죄인들의 제물이 되신 예수 성심<br>○ 주님께 바라는 이들의 구원이신 예수 성심<br>○ 주님을 믿으며 죽는 이들의 희망이신 예수 성심<br>○ 모든 성인의 즐거움이신 예수 성심</p><p>○ 하느님의 어린양, 세상의 죄를 없애시는 주님<br>● 저희를 용서하소서.</p><p>○ 하느님의 어린양, 세상의 죄를 없애시는 주님<br>● 저희의 기도를 들어주소서.</p><p>○ 하느님의 어린양, 세상의 죄를 없애시는 주님<br>● 자비를 베푸소서.</p><p>○ 마음이 어질고 겸손하신 예수님<br>● 저희 마음을 주님 마음과 같게 하소서.</p><br><p><span class="symbol">†</span> 기도합시다.<br>전능하시고 영원하신 하느님,<br>지극히 사랑하시는 성자의 성심을 보시고<br>죄인들을 대신하여 바친<br>성자의 찬미와 보속으로 마음을 푸시어<br>주님의 자비를 간구하는 저희를 용서하소서.<br>성자께서는 영원히 살아계시며 다스리시나이다.</p><p>◎ 아멘.</p>`},
                {id: 'special_15', title: '위령성월', content: `<p><span class="rubric bold">시편 129</span></p><p>○ 깊은 구렁 속에서<br>주님, 당신께 부르짖나이다.</p><p>● 주님, 제 소리를 들어주소서.<br>애원하는 제 소리에 당신 귀를 기울이소서.</p><p>○ 주님, 당신이 죄악을 헤아리신다면<br>주님, 감당할 자 누구이리까?</p><p>● 당신은 용서하는 분이시니<br>사람들이 당신을 경외하리이다.</p><br><p>○ 나 주님께 바라네.<br>내 영혼이 주님께 바라며<br>그분 말씀에 희망을 두네.</p><p>● 파수꾼이 새벽을 기다리기보다<br>내 영혼이 주님을 더 기다리네.</p><p>○ 파수꾼이 새벽을 기다리기보다<br>이스라엘이 주님을 더 기다리네.</p><p>● 주님께는 자애가 있고<br>풍요로운 구원이 있네.</p><p>○ 바로 그분이 이스라엘을<br>모든 죄악에서 구원하시리라.</p><br><p><span class="symbol">†</span> 기도합시다.<br>사람을 창조하시고<br>믿는 이들을 구원하시는 하느님,<br>저희의 간절한 기도를 들으시어<br>주님을 섬기던 사람들의 죄를 용서하시고<br>그들이 바라던 영원한 행복을 얻게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p><br><p><span class="symbol">†</span> 주님, 그들에게 영원한 안식을 주소서.<br>◎ 영원한 빛을 그들에게 비추소서.</p><br><p><span class="symbol">†</span> 세상을 떠난 모든 이가<br>하느님의 자비로 평화의 안식을 얻게 하소서.</p><p>◎ 아멘.</p><br><span class="rubric">11월 1일부터 8일까지 정성된 마음으로 묘지를 방문하고, 세상을 떠난 이들을 위하여 기도하는 교우들은 연옥에 있는 이들에게 양도할 수 있는 전대사를 받을 수 있다.</span>`},
                {id: 'special_14', title: '묵주기도성월', content: `<p><span class="bold">성모 찬송</span></p><p>○ 모후이시며 사랑이 넘친 어머니,<br>우리의 생명, 기쁨, 희망이시여,</p><p>● 당신 우러러 하와의 그 자손들이<br>눈물을 흘리며 부르짖나이다,<br>슬픔의 골짜기에서.</p><p>○ 우리들의 보호자 성모님,<br>불쌍한 저희를<br>인자로운 눈으로 굽어보소서.</p><p>● 귀양살이 끝날 때에<br>당신의 아들 우리 주 예수님 뵙게 하소서.<br>너그러우시고, 자애로우시며<br>오! 아름다우신 동정 마리아님.</p><p>○ 천주의 성모님, 저희를 위하여 빌어주시어<br>● 그리스도께서 약속하신 영원한 생명을 얻게 하소서.</p><br><p><span class="symbol">†</span> 기도합시다.<br>하느님,<br>외아드님께서 삶과 죽음과 부활로<br>저희에게 영원한 구원을 마련해 주셨나이다.<br>복되신 동정 마리아와 함께 이 신비를 묵상하며<br>묵주기도를 바치오니<br>저희가 그 가르침을 따라<br>영원한 생명을 얻게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p>`},
                {id: 'special_13', title: '순교자 성월', content: `<p><span class="bold">한국 순교자들에게 바치는 기도</span></p><p>○ 이땅의 모든 순교자여,<br>당신들은 하느님의 은총에 힘입어<br>굳은 신앙으로<br>예수 그리스도의 사랑과<br>복음과 교회를 위하여<br>피를 흘리셨나이다.</p><p>● 저희는 현세에서 악의 세력과 치열하게 싸우며<br>당신들이 거두신 승리의 영광을 노래하고<br>모든 선의 근원이신 하느님을 찬양하오니<br>저희를 위하여 빌어주소서.</p><p>○ 위대하신 순교자들이여,<br>천상의 모후이신 성모 마리아와 함께<br>저희를 위하여 빌어주시어<br>하느님의 자비를 얻어 주소서.</p><p>● 지금도 어둠의 세력이<br>교회를 박해하고 있사오니<br>하느님께서 전능하신 팔로 교회를 붙들어 보호하시며<br>아직 어둠 속에 있는 지역에까지<br>널리 펴시도록 빌어주소서.</p><p>○ 용감하신 순교자들이여, 특별히 청하오니<br>우리나라를 위하여 하느님께 빌어주소서.</p><p>● 당신들은 이땅에서<br>많은 고난을 겪으며 사시다가<br>목숨까지 바치셨사오니</p><p>○ 전능하신 하느님께 빌어주시어<br>교회를 이땅에서 날로 자라게 하시며<br>사제와 수도자를 많이 나게 하시고</p><p>● 신자들이 주님의 계명을 잘 지키고<br>냉담자들은 다시 열심해지며<br>갈린 형제들은 같은 믿음으로 하나 되고<br>비신자들은 참신앙으로 하느님을 알아<br>천지의 창조주<br>인류의 구세주를 찾아오게 하소서.</p><p>○ 참으로 영광스러운 순교자들이여,<br>저희도 그 영광을 생각하며 기뻐하나이다.<br>간절히 청하오니<br>자비로우신 하느님 아버지께 빌어주시어<br>저희와 친척과 은인들에게<br>필요한 은혜를 얻어 주소서.</p><p>● 또한 저희가 죽을 때까지<br>예수 그리스도를 한결같이 믿어 증언하며<br>비록 피는 흘리지 못할지라도<br>주님의 은총을 입어 선종하게 하소서.</p><p>○ 성 김대건 안드레아와 성 정하상 바오로와<br>동료 순교자들이여,</p><p>● 저희를 위하여 빌어주소서.</p>`},
                {id: 'special_12', title: '예수 성심 성월', content: `<p><span class="bold">예수 성심께 천하만민을 바치는 기도</span></p><p>○ 지극히 어지신 구세주 예수님,<br>주님 앞에 꿇어 경배하오니<br>저희를 굽어살피소서.</p><p>● 저희는 이미 주님의 백성이오니<br>언제나 주님과 함께 살아가기를 바라나이다.<br>주님과 하나 되고자<br>오늘 저희를 주님의 성심께 봉헌하나이다.</p><p>○ 주님을 일찍이 알아 모시지 못한 사람도 많고<br>주님을 알고도 주님의 계명을 저버리고<br>주님을 떠난 사람도 많사오니</p><p>● 지극히 인자하신 예수님,<br>이런 사람들도 다 불쌍히 여기시어<br>주님의 성심께 이끌어 들이소서.</p><p>○ 주님께서는 목자이시니<br>주님을 떠나지 않은 사람들을 보살피시고<br>이미 주님을 떠난 사람들은<br>다시 아버지 집으로 돌아오게 하시어<br>굶어 죽는 일이 없게 하소서.</p><p>● 옹졸한 고집에 사로잡힌 사람들이나<br>불목하여 갈린 사람들도 부르시어<br>저희가 모두 같은 신앙을 고백하며<br>한 우리에서 한 목자 밑에 살게 하소서.</p><p>○ 주님, 거룩한 교회를 평화의 깃발로 세우시고<br>모든 나라에 참된 평화를 주시어<br>온 세상 어디서나 입을 모아<br>저희를 구원하신 성부와 성자와 성령께<br>영원히 찬미와 영광과 흠숭을 드리게 하소서.</p><p>◎ 아멘.</p><p>○ 예수 성심,<br>● 이 세상에 주님의 나라를 세우소서.</p>`},
                {id: 'special_11', title: '성모성월', content: `<p><span class="bold">마리아의 노래</span></p><br><span class="rubric">성모님께서 예수님을 잉태하신 뒤 엘리사벳의 집을 방문하셨다. 그때 엘리사벳의 찬양을 받으시고, 성모님께서 겸손한 마음으로 하느님을 찬송하신 노래이다.</span><br><p>○ 내 영혼이 주님을 찬양하고<br>내 구원자 하느님 안에서 내 마음 기뻐 뛰노네.</p><p>● 그분은 비천한 당신 종을 굽어보셨네.<br>이제부터 과연 모든 세대가 나를 복되다 하리라.</p><p>○ 전능하신 분이 나에게 큰일을 하셨으니<br>그 이름은 거룩하신 분이시다.</p><p>● 그분 자비는 세세 대대로<br>그분을 두려워하는 이들에게 미치리라.</p><p>○ 그분은 당신 팔로 권능을 떨치시어<br>마음이 교만한 자들을 흩으셨네.</p><p>● 권세있는 자를 자리에서 내치시고<br>비천한 이를 들어 올리셨네.</p><p>○ 굶주린 이를 좋은 것으로 채워 주시고<br>부유한 자를 빈손으로 돌려보내셨네.</p><p>● 당신 자비를 기억하시어<br>당신 종 이스라엘을 돌보셨으니</p><p>○ 우리 조상들에게 말씀하신 대로<br>아브라함과 그 후손에게 그분의 자비 영원하리라.</p><p>● 영광이 성부와 성자와 성령께<br>○ 처음과 같이<br>이제와 항상 영원히. 아멘.</p><br><p><span class="symbol">†</span> 기도합시다.<br>저희를 하느님 아버지께 이끄시는 주 예수 그리스도님,<br>주님의 어머니 동정 마리아를<br>저희 어머니가 되게 하시고<br>저희의 전구자로 세우셨나이다.<br>비오니, 성모 마리아의 전구를 들으시어<br>저희가 주님께 간구하는 모든 은혜를<br>받아 누리게 하소서.</p><p>◎ 아멘.</p>`},
                {id: 'special_10', title: '성 요셉 성월', content: `<p><span class="bold">성 요셉에게 바치는 기도</span></p><p>○ 우리 주 예수님을 기르신 아버지시요<br>정결하신 동정 마리아의 배필이시며<br>임종하는 이의 수호자이신<br>성 요셉께 간절히 청하오니</p><p>● 하느님께 빌어 주시어<br>저희가 예수님을 사랑하며 충실히 따르게 하소서.<br>또한 죽을 때에 저희를 지켜주소서.</p><p>◎ 아멘.</p>`}
            ],
            'etc': [
                {id: 'etc_43', title: '하느님 자비를 구하는 기도', content: `<p>(묵주를 이용하여) 주님의 기도, 성모송, 사도신경을 바친다.</p><br><p><span class="rubric bold">각 단에서 주님의 기도 대신에 아래의 기도를 바친다.</span><br>영원하신 아버지, 저희가 지은 죄와 온 세상의 죄를 보속하는 마음으로, 사랑하시는 성자 우리 주 예수 그리스도의 몸과 피, 영혼과 신성을 바치나이다.</p><br><p><span class="rubric bold">각 단에서 성모송 대신에 아래의 기도를 10번 바친다.</span><br>예수님의 수난을 보시고, 저희와 온 세상에 자비를 베푸소서.</p><br><p><span class="rubric bold">5단 기도를 바친 다음, 아래의 기도를 3번 바친다.</span><br>거룩하신 하느님, 거룩하신 용사님, 거룩하신 불사신, 저희와 온 세상에 자비를 베푸소서.</p><br><p><span class="rubric bold">끝으로 아래의 기도를 바친다.</span><br>오, 예수 성심, 저희를 위하여 피와 물을 흘리신 자비의 샘이신 주님, 저는 주님께 의탁하나이다.</p><br><p class="align-right">- 2022년 3월 23일 주교회의 2022년 춘계 정기총회 승인 -</p>`},
                {id: 'etc_42', title: '가뭄과 장마 때의 바치는 기도', content: `<p>○ 만물을 창조하시고 다스리시는 하느님,<br>이 가뭄(장마)에 어려움을 겪고 있는 저희를 불쌍히 보시고<br>비를 내리시어(장마를 거두시어)<br>근심을 덜고 애쓴 보람을 얻게 하소서.</p><p>● 모든 사람이<br>살아가는 데에 필요한 것을 얻고<br>평화로이 주님을 섬기며<br>열심히 살아가게 하소서.</p><p>◎ 아멘.</p>`},
                {id: 'etc_41', title: '새해를 맞이하며 바치는 기도', content: `<p>○ 시작이요 마침이신 주 예수님,<br>지난 한해 동안 베풀어주신 은혜에 감사하나이다.</p><p>● 저희가 지은 죄를 모두 용서하시고<br>더욱 큰 은혜를 베풀어주시어<br>새해에는 나쁜 습관을 버리고<br>맡은 책임을 다하여<br>가정과 사회 발전에 이바지하게 하소서.</p><p>○ 또한 저희 생각과 말과 행위를 주님께 바치오니<br>하느님의 영광과 모든 사람의 구원을 위하여<br>열심히 일하도록 도와주소서.</p><p>◎ 아멘.</p>`},
                {id: 'etc_40', title: '세상을 떠난 형제, 친척, 친구, 은인을 위한 기도', content: `<p>○ 사람의 구원을 기뻐하시는 하느님,<br>저희와 함께 주님을 섬기고 서로 사랑하며<br>구원의 길을 걸어온<br>저희 형제와 친척, 친구와 은인을 위하여<br>주님의 자비를 간구하오니<br>저희 기도를 들으시고<br>그들이 주님의 나라에서 영원한 행복을 누리게 하소서.</p><p>◎ 아멘.</p>`},
                {id: 'etc_39', title: '세상을 떠난 부모를 위한 기도', content: `<p>○ 주님,<br>주님께서는 부모를 효도로 공경하며<br>은혜를 갚으라 하셨나이다.</p><p>● 세상을 떠난<br>부모(아버지 또는 어머니)를 생각하며 기도하오니<br>세상에서 주님을 섬기고 주님의 가르침을 따랐던<br>그들(그)에게 자비를 베푸시어<br>영원한 행복을 누리게 하소서.</p><p>○ 또한 저희는 부모(아버지 또는 어머니)를 생각하여<br>언제나 서로 화목하고 사랑하며<br>주님의 뜻에 따라 살아가게 하소서.</p><p>◎ 아멘.</p>`},
                {id: 'etc_37', title: '선종을 위한 기도', content: `<p>죽음을 이기고 부활하신 주님,<br>저에게 선종하는 은혜를 주시어<br>죽음을 맞는 순간에도<br>영원한 천상 행복을 생각하고<br>주님을 그리워하며<br>기꺼이 죽음을 받아들이게 하소서.<br>아멘.</p>`},
                {id: 'etc_35', title: '병자를 위한 기도', content: `<p>○ 전능하시고 영원하신 하느님 아버지,<br>아버지께서는 앓는 사람에게 강복하시고<br>갖가지 은혜로 지켜 주시니<br>주님께 애원하는 저희 기도를 들으시어<br><span class="rubric bold">(아무)</span>의 병을 낫게 하시며<br>건강을 도로 주소서.</p><p>● 주님의 손으로 일으켜 주시고<br>주님의 팔로 감싸 주시며<br>주님의 힘으로 굳세게 하시어<br>더욱 힘차게 살아가게 하소서.</p><p>◎ 아멘.</p>`},
                {id: 'etc_34', title: '군인을 위한 기도', content: `<p>○ 평화의 주님,<br>오늘도 조국을 지키고<br>정의와 평화를 위해 헌신하는 군인들을 굽어보시어<br>어려움을 이겨 내는 굳건한 힘과 용기를 주소서.</p><p>● 주님의 자녀들은<br>복음에 따라 더욱 충실히 살아가게 하시고<br>아직 주님을 모르는 군인들에게는<br>주님의 자녀가 되는 은총을 주소서.</p><p>○ 또한 군종 사제들은 굳건한 믿음과 열정으로<br>군인들을 보살피게 하시고<br>저희는 열심히 기도하고 후원하여<br>군의 복음화에 이바지하게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p>`},
                {id: 'etc_28', title: '군인의 기도', content: `<p>○ 평화의 임금이신 주님,<br>저희에게 굳은 믿음을 주시어<br>군무에 충실하며<br>참된 군인으로서 전우애를 나누고<br>조국과 세계의 평화를 위하여 헌신하게 하소서.<br>또한 저희 가족을 돌보시어<br>주님의 참평화를 누리게 하소서.</p><p>◎ 아멘.</p>`},
                {id: 'etc_27', title: '부부의 기도', content: `<p>○ 인자하신 하느님 아버지,<br>혼인성사로 저희를 맺어주시고<br>보살펴 주시니 감사하나이다.</p><p>● 이제 저희가 혼인 서약을 되새기며 청하오니<br>저희 부부가 그 서약을 따라<br>즐거울 때나 괴로울 때나<br>잘 살때나 못살 때나<br>성할 때나 아플 때나<br>서로 사랑하고 존경하며 신의를 지키게 하소서.</p><p>○ 또 청하오니<br>언제나 주님을 찬미하는 저희 부부의 삶이<br>주님의 사랑을 드러내는 성사가 되게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p>`},
                {id: 'etc_26', title: '자녀를 위한 기도', content: `<p>○ 세상을 창조하신 하느님,<br>하느님께서는 저희에게 귀한 자녀를 주시어<br>창조를 이어가게 하셨으니<br>주님의 사랑으로 자녀를 길러<br>주님의 영광을 드러내게 하소서.</p><p>● 주님, 사랑하는 저희 자녀를<br>은총으로 보호하시어<br>세상 부패에 물들지 않게 하시며<br>온갖 악의 유혹을 물리치고<br>예수님을 본받아<br>주님의 뜻을 이루는 일꾼이 되게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p>`},
                {id: 'etc_25', title: '부모를 위한 기도', content: `<p>○ 인자하신 하느님,<br>하느님께서는 부모를 사랑하고 공경하며<br>그 은덕에 감사하라 하셨으니<br>저희가 효성을 다하여 부모를 섬기겠나이다.</p><p>● 저희 부모는 저희를 낳아 기르며<br>갖은 어려움을 기쁘게 이겨 냈으니<br>이제는 그 보람을 느끼며<br>편히 지내게 하소서.</p><p>○ 주님, 저희 부모에게 강복하시고<br>은총으로 지켜주시며<br>마침내 영원한 행복을 누리게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p>`},
                {id: 'etc_24', title: '가정을 위한 기도 2', content: `<p>○ 사랑이요 생명이신 하느님 아버지,<br>세상의 모든 가정은 당신의 성삼에서 비롯되었나이다.</p><p>● 여인에게서 태어나신 성자 예수 그리스도를 통하여<br>거룩한 사랑의 샘이신 성령의 도움으로<br>모든 가정이<br>생명과 사랑의 보금자리가 되게 하소서.</p><p>○ 부부들의 생각과 행위를 당신의 은총으로 이끄시어<br>모든 가정의 선익에 이바지하게 하소서.</p><p>● 자녀들은 가정에서 자신들의 존엄성을 깨닫고<br>진리와 사랑으로 성숙하게 하소서.</p><p>○ 저희 가정이 겪는 모든 어려움을<br>혼인성사의 은총으로 극복하게 하소서.</p><p>● 나자렛 성가정의 전구를 통하여 가정이 성화되고<br>가정을 통하여 세상이 성화되게 하소서.</p><p>○ 길이요 진리요 생명이신<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p>`},
                {id: 'etc_23', title: '가정을 위한 기도 1', content: `<p>○ 마리아와 요셉에게 순종하시며<br>가정생활을 거룩하게 하신 예수님,<br>저희 가정을 거룩하게 하시고<br>저희가 성가정을 본받아<br>주님의 뜻을 따라 살게 하소서.</p><p>● 가정생활의 자랑이며 모범이신<br>성모 마리아와 성 요셉,<br>저희 집안을 위하여 빌어 주시어<br>모든 가족이 건강하고 행복하게 하시며<br>언제나 주님을 섬기고 이웃을 사랑하며 살다가<br>주님의 은총으로 영원한 천상 가정에 들게 하소서.</p><p>◎ 아멘.</p>`},
                {id: 'etc_22', title: '성전 건립 기도', content: `<p>○ 지극히 자비로우신 주 하느님,<br>세례로 저희를 새로 태어나게 하시고<br>거룩한 교회의 한가족이 되게 해 주셨으니 감사하나이다.</p><p>● 저희는 주님께서 주신 거룩한 품위를 지키지 못하고<br>온갖 욕심과 오만으로 가득 차<br>주님의 뜻을 소홀히 하였나이다.</p><p>○ 이제 주님의 자비를 청하며<br>저희가 힘을 모아 주님을 예배할 새 성전을 세우고<br>그곳에서 주님의 뜻을 이룩하여<br>사랑과 일치의 공동체를 가꾸어 나가고자 하오니<br>저희를 지켜주시고 이끌어주소서.</p><p>● 주님께서 손수 이 본당 공동체의 역사를 주관하시어<br>이 성전 건축을 계기로 저희가 하나 되고<br>형제적 사랑과 나눔이 충만한 공동체가 되게 하소서.<br>마침내 성전이 완성되는 날<br>저희가 모두 기쁜 마음으로 주님을 찬미하게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p>`},
                {id: 'etc_21', title: '대중매체 선용을 위한 기도', content: `<p>○ 사람들을 사랑하시어 말씀이신 성자를 보내주신 하느님,<br>성자 예수 그리스도께서는 몸소 구원의 기쁜 소식을 전하시며<br>사도들을 부르시어 교회를 세우시고<br>세상 모든 사람에게 복음을 전하라고 명하셨나이다.</p><p>● 하느님께서는 이 복음 전파의 사명을 수행하도록<br>저희에게 여러 가지 대중매체를 선물로 주셨으니<br>이 선물의 뜻을 잘 깨달아<br>복음을 전파하는 구원의 도구로 쓰게 하소서.</p><p>○ 대중매체의 영향력이 무엇보다 커진 오늘날<br>특별히 대중매체 종사자들과 관리자들이<br>바른 양심을 지니고<br>매체들을 향락과 정치 도구로<br>그릇되게 쓰는 일이 없게 하소서.</p><p>● 대중매체를 이용하는 이들도 올바른 지식과 분별력을 갖추어<br>주님 뜻에 어긋나고 인간의 품위를 해치는 온갖 것을 피하고<br>오로지 주님의 영광과 모든 이의 유익을 위하여 쓰게 하소서.</p><p>◎ 아멘.</p>`},
                {id: 'etc_20', title: '복음화를 위한 기도', content: `<p>○ 만민의 임금이신 주님,<br>죽음으로 진리를 증언한 선조들을 통하여<br>이땅에 구원의 빛을 밝혀 주셨으니 감사하나이다.</p><p>● 이제 저희도 선조들의 믿음을 본받아<br>힘차게 복음을 전하는 일꾼이 되어<br>온 민족의 복음화를 이루게 하소서.<br>또한 세계를 밝히는 등불이 되어<br>인류 평화와 번영에 이바지하게 하소서.</p><p>◎ 아멘.</p>`},
                {id: 'etc_19', title: '성서 사도직을 위한 기도', content: `<p>○ 하늘과 땅을 만드시고<br>사람을 귀하게 지으신 하느님 아버지,<br>예수 그리스도를 저희에게 보내주시어<br>하느님을 아버지라 부르게 하시니 찬미받으소서.</p><p>● 살아있고 힘이 있는 말씀으로<br>주님께서 친히 저희에게 사랑을 알려 주시고<br>삶의 뜻을 깨우쳐 주시니 감사하나이다.</p><p>○ 참으로 좋으신 하느님 아버지,<br>저희가 성경을 멀리하고<br>그 가르침을 알면서도 실행하지 못하였으니<br>성령의 능력으로 저희의 영을 새롭게 하시어<br>성경을 가까이하며<br>예수 그리스도와 이웃을 더욱 잘 알게 하여 주소서.</p><p>● 저희 구원을 간절히 바라시는 하느님 아버지,<br>저희가 성경을 생명의 말씀으로 받아들여<br>믿고 기도하고 살며 선포하게 하시고<br>언제나 예수 그리스도를 통하여<br>성령으로 하나 되어 아버지께 나아가게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p>`},
                {id: 'etc_18', title: '민족의 화해와 일치를 위한 기도', content: `<p>○ 사람을 당신의 모습대로 지어내신 주님,<br>저희가 모두 주님을 닮게 하소서.</p><p>● 사랑으로 하나 되신 주님처럼<br>저희가 서로 사랑하여 하나 되게 하소서.</p><p>○ 평화를 바라시는 주님,<br>이 나라 이땅에<br>잃어버린 평화를 되찾게 하소서.</p><p>● 한 핏줄 한 겨레이면서도 서로 헐뜯고 싸웠던<br>저희 잘못을 깨우쳐 주소서.</p><p>○ 분단의 깊은 상처를 낫게 하시고<br>서로 용서하는 화해의 은총을 내려주소서.</p><p>● 인류의 일치를 바라시는 주님,<br>갈라져 사는 저희 겨레의 아픔을 어루만져 주소서.</p><p>○ 저희의 무관심을 깨닫게 하시어<br>겨레의 일치를 위하여 열심히 일하고<br>가진 바를 나누게 하소서.</p><p>● 서로 존중하고 사랑하며<br>평화 통일을 이룩하게 하소서.</p><p>○ 온 겨레가 주님을 믿어<br>이 땅에 주님의 나라를 이루게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p><p>○ 평화의 모후시여,<br>● 저희를 위하여 빌어 주소서.<br>○ 한국의 모든 순교 성인이여,<br>● 저희를 위하여 빌어 주소서.</p>`},
                {id: 'etc_17', title: '그리스도교 일치를 위한 기도', content: `<p>○ 주 예수 그리스도님,<br>주님께서는 돌아가시기 전날 밤에<br>아버지께 기도하신 대로<br>주님과 아버지께서 하나이시듯<br>주님을 믿는 모든 이가 하나 되기를 바라셨나이다.</p><p>● 저희는 같은 믿음으로 세례를 받고<br>같은 주님을 모시면서도<br>서로 갈라져<br>주님의 뜻을 이루지 못하고 있나이다.</p><p>○ 이제 저희는<br>한마음으로 기도하며<br>하나가 되고자 하오니</p><p>● 저희를 도와주시어<br>미움과 불신을 버리고<br>진리 안에서 서로 사랑하며<br>하나의 공동체를 이루게 하소서.</p><p>◎ 아멘.</p>`},
                {id: 'etc_16', title: '성소를 위한 기도', content: `<p>○ 좋으신 목자 예수님,<br>주님께서는 사도들을 부르시어<br>사람 낚는 어부가 되게 하셨나이다.</p><p>● 비오니, 오늘도<br>믿음직한 젊은이들을 많이 부르시어<br>주님의 제자로 삼으시고<br>주님의 일꾼으로 삼으소서.</p><p>○ 온 인류의 구원을 바라시는 주님,<br>온 세계의 수많은 사람들이<br>진리의 빛과 사랑의 불을 갈망하고 있사오니</p><p>● 많은 젊은이들이 그 갈망에 응답하여<br>땅 끝까지 복음을 전하며<br>세상의 빛과 소금이 되게 하소서.</p><p>○ 주님, 슬기로운 여성들을 많이 부르시어<br>주님께 자신을 봉헌하여 복음의 완덕으로 나아가게 하소서.</p><p>● 또한 주님의 몸인 교회에 봉사하며<br>도움과 사랑을 애타게 바라는 이웃들에게 헌신하게 하소서.</p><p>◎ 아멘.</p>`},
                {id: 'etc_15', title: '비신자들을 위한 기도', content: `<p><span class="rubric bold">시편 117(116)</span></p><p>○ 주님을 찬양하여라, 모든 민족들아.<br>주님을 찬미하여라. 모든 겨레들아,</p><p>● 우리 위한 주님 사랑 굳건하여라.<br>주님의 진실하심 영원하여라.<br>(알렐루야!)</p><p>○ 영광이 성부와 성자와 성령께<br>● 처음과 같이<br>이제와 항상 영원히, 아멘.</p><p>○ 주님, 저희의 기도를 들어주소서.<br>● 또한 저희의 부르짖음이 주님께 이르게 하소서.</p><br><p><span class="symbol">†</span> 기도합시다.<br>전능하시고 영원하신 하느님,<br>하느님께서는 모든 이를 구원하시려고<br>예수 그리스도를 세상에 보내주셨으니<br>예수 그리스도의 공로를 보시고<br>비신자들을 구원하시어<br>그들이 그릇된 생각과 미신 행위를 끊어 버리고<br>하느님의 백성이 되어<br>영광스러이 주님의 이름을 찬송하게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p>`},
                {id: 'etc_14', title: '평신도 사도직을 위한 기도 2', content: `<p>○ 하느님 아버지,<br>저희 평신도에게 베푸신 특은에 감사하나이다.<br>주님께서는 일찍이 이땅의 백성들에게<br>흔들리지 않는 믿음과 걱이지 않는 용기를 부어주시어<br>스스로 교회의 터전을 닦도록 하셨으니<br>저희도 주님의 뜻을 깊이 깨닫고 교회 발전에 앞장서<br>자랑스런 평신도 사도직을 수행하도록 이끌어주소서.</p><p>● 주님,<br>주님께서는 이땅에 수많은 평신도 순교자를 내시고<br>이 겨레에 주님의 은총이 넘치게 하셨나이다.<br>저희가 그 거룩하고 빛나는 순교 정신을 이어받아<br>굳건한 믿음과 불타는 사랑으로<br>온 땅에 복음을 전파하게 하소서.</p><p>○ 주님, 저희가 이 시대 평신도의 사명을 깊이 깨닫고<br>성령의 이끄심으로 늘 새로워지며<br>이웃을 사랑하고 사회 정의를 실현하여<br>이땅에 주님의 나라를 세우게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p>`},
                {id: 'etc_13', title: '평신도 사도직을 위한 기도 1', content: `<p>○ 주 예수 그리스도님,<br>저희를 하느님의 백성으로 부르시어<br>한 형제자매로 살아가게 하셨으니<br>주님께서 도와주시어<br>교회와 사회 안에서<br>주님의 말씀을 충실히 실천하게 하소서.</p><p>● 주님께서는 길이요 진리요 생명이시니<br>저희가 주님 안에서<br>인생의 참뜻을 발견하고<br>세상의 온갖 유혹에서 해방되어<br>그리스도인의 드높은 품위를 지켜가게 하소서.</p><p>○ 주님께서는 저희를 사도직에 부르셨으니<br>성령의 불로 저희를 새롭게 하시어<br>선의를 지닌 모든 사람과 힘을 합쳐<br>이 세상에 진리와 자유, 정의와 사랑이 넘치는<br>하느님 나라를 세우게 하소서.<br>주님께서는 영원히 살아계시며 다스리시나이다.</p><p>◎ 아멘.</p>`},
                {id: 'etc_12', title: '수도자들을 위한 기도', content: `<p>○ 세례성사의 은총을 더욱 풍부하게 열매 맺도록<br>자녀들을 수도자의 길로 부르시는 하느님,<br>수도자들을 통하여<br>끊임없이 하느님을 찾고<br>오롯한 사랑으로 그리스도께 봉헌하는 삶이<br>교회의 시작부터 지금까지 지속되게 하시니 감사하나이다.</p><p>● 하느님,<br>수도자들이 성령께 온전히 귀기울여<br>복음의 증거자로서 정결과 가난과 순명의 삶을 살게 하시어<br>자유로이 그리스도를 따르고 더욱 그리스도를 닮아<br>세상의 구원을 위하여 기도하고 봉사하게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p>`},
                {id: 'etc_11', title: '사제들을 위한 기도 2', content: `<p>○ 지극히 사랑하올 예수님,<br>주님을 충실히 따르고 사랑하는<br>사제들을 굽어살피시고<br>그들의 마음을 성령으로 가득 채우시어<br>이 세상의 빛과 소금이 되게 하소서.</p><p>● 사제들이 주님의 사랑을 깨닫고 증언하며<br>주님의 믿음을 따르고 지켜 가게 하소서.<br>또한 주님의 희생을 본받고 실천하며<br>주님의 가난을 받아들여 자유로워지고<br>주님의 겸손을 배워 스스로 낮추게 하소서.</p><p>○ 사제들이 언제 어디서나 주님만을 바라고 의지하며<br>하느님 백성의 길잡이가 되고<br>일치의 중심이 되게 하소서.</p><p>● 사제들이 모범이 되어<br>성실한 젊은이들이<br>주님의 부르심을 깨닫고 기꺼이 응답하게 하소서.</p><p>◎ 아멘</p>`},
                {id: 'etc_10', title: '사제들을 위한 기도 1', content: `<p>○ 영원한 사제이신 예수님,<br>주님을 본받으려는 사제들을 지켜주시어<br>어느 누구도 그들을 해치지 못하게 하소서.</p><p>● 주님의 영광스러운 사제직에 올라<br>날마다 주님의 몸과 피를 축성하는 사제들을<br>언제나 깨끗하고 거룩하게 지켜주소서.</p><p>○ 주님의 뜨거운 사랑으로<br>사제들을 세속에 물들지 않도록 지켜 주소서.</p><p>● 사제들이 하는 모든 일에 강복하시어<br>은총의 풍부한 열매를 맺게 하시고<br>○ 저희로 말미암아<br>세상에서는 그들이 더없는 기쁨과 위안을 얻고<br>천국에서는 찬란히 빛나는<br>영광을 누리게 하소서.</p><p>◎ 아멘.</p>`},
                {id: 'etc_9', title: '교황이나 주교를 위한 기도', content: `<p>○ 모든 믿는 이의 목자요 임금이신 하느님,<br>친히 주님의 일꾼 (아무)를 거룩한 교회의 목자로 세우셨으니<br>인자로이 굽어보시어<br>올바른 말과 행동으로 맡은 양 떼를 보살피고<br>마침내 그들과 함께 영원한 생명에 이르게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p>`},
                {id: 'etc_8', title: '성 암브로시오의 사은 찬미가', content: `<p>○ 찬미하나이다, 주 하느님.<br>주님이신 하느님을 찬양하나이다.</p><p>● 영원하신 아버지를<br>온 세상이 삼가 받을어 모시나이다.</p><p>○ 모든 천사들이<br>하늘과 세상의 권능 천사들이<br>케루빔과 세라핌이<br>끊임없이 목소리를 높여 노래하리이다.</p><p>● 거룩하시도다! 거룩하시도다! 거룩하시도다!<br>온 누리의 주 하느님!<br>하늘과 땅에 가득 찬 엄위로우신 그 영광,</p><p>○ 영광에 빛나는 사도들의 모임<br>그 보람 드러나는 예언자들의 대열<br>눈부신 순교자들의 무리가<br>아버지를 드높이 기리나이다.</p><p>● 땅에서는 어디서나 거룩한 교회가<br>그지없이 엄위하신 아버지를<br>받들어야 할 아드님, 외아드님을<br>아울러 보호자 성령님을 찬양하나이다.</p><p>○ 영광의 임금님이신 그리스도<br>하느님 아버지의 영원하신 아드님<br>인간을 구하시려 동정녀의 태중을 꺼리지 않으시고<br>몸소 인간이 되셨나이다.</p><p>● 죽음의 독침을 물리치시고<br>믿는 이들에게 천국을 열어 주셨나이다.</p><p>○ 하느님의 오른편, 아버지의 영광 안에 계시며<br>세상을 심판하러 오시리라 믿나이다.</p><p>● 보배로운 피로 구원받은 종들인 저희를<br>보호하시기를 비오니<br>저희도 성인들과 한 무리에 들어<br>영원토록 영광을 누리게 하소서.</p><br><p><span class="rubric">아래( ) 안의 노래는 생략할 수 있다.</span></p><p><span class="rubric">(</span>○ 주님, 주님의 백성을 구원하시고<br>주님의 상속자들에게 강복하소서.</p><p>● 그 백성 주님께서 다스리시고<br>영원토록 이끌어 주소서.</p><p>○ 나날이 주님을 찬양하는 저희<br>세세 대대 주님 이름 찬미하리이다.</p><p>● 주님, 비오니<br>오늘 저희를 죄짓지 않도록 지켜 주소서.</p><p>○ 주님, 저희에게 자비를 베푸소서.<br>● 저희에게 자비를 베푸소서.</p><p>○ 주님, 저희가 주님께 바란 대로<br>저희에게 자비를 내리소서.</p><p>● 주님, 저희가 주님께 바랐사오니<br>영원토록 부끄러움 없으리이다.<span class="rubric">)</span></p>`},
                {id: 'etc_7', title: '성 토마스의 성체 찬미가', content: `<p>○ 엎드려 절하나이다.<br>눈으로 보아 알 수 없는 하느님,<br>두 가지 형상 안에 분명히 계시오나<br>우러러 뵈올수록 전혀 알 길 없기에<br>제 마음은 오직 믿을 뿐이옵니다.</p><p>● 보고 맛보고 만져봐도 알 길 없고<br>다만 들음으로써 믿음 든든해지오니<br>믿나이다. 천주 성자 말씀하신 모든 것을.<br>주님의 말씀보다 더 참된 진리 없나이다.</p><p>○ 십자가 위에서는 신성을 감추시고<br>여기서는 인성마저 아니 보이시나<br>저는 신성, 인성을 둘 다 믿어 고백하며<br>뉘우치던 저 강도의 기도 올리나이다.</p><p>● 토마스처럼 그 상처를 보지는 못하여도<br>저의 하느님이심을 믿어 의심 않사오니<br>언제나 주님을 더욱더 믿고<br>바라고 사랑하게 하소서.</p><p>○ 주님의 죽음을 기념하는 성사여,<br>사람에게 생명주는 살아있는 빵이여,<br>제 영혼 당신으로 살아가고<br>언제나 그 단맛을 느끼게 하소서.</p><p>● 사랑 깊은 펠리칸, 주 예수님,<br>더러운 저, 당신 피로 씻어주소서.<br>그 한 방울만으로도 온 세상을<br>모든 죄악에서 구해 내시리이다.</p><p>○ 예수님, 지금은 가려져 계시오나<br>이렇듯 애타게 간구하오니<br>언젠가 드러내실 주님 얼굴 마주 뵙고<br>주님 영광 바라보며 기뻐하게 하소서.</p><p>◎ 아멘.</p>`},
                {id: 'etc_6', title: '성모께 자기를 바치는 기도', content: `<p>○ 천주의 성모 마리아님,<br>저희는 비록 성모님을 모시기에 합당하지 않사오나<br>성모님의 사랑을 굳게 믿으며<br>모든 천사와 더불어 당신을 어머니로 모시는 저희를<br>자애로이 지켜 주소서.</p><p>● 저희는 당신 아들 예수님을<br>더욱 충실히 섬기며<br>어머니 슬하에 살기로 약속하나이다.</p><p>○ 십자가에 높이 달리신 예수님께서는<br>숨을 거두시며<br>당신 자신은 성부께 맡기시고<br>성모님은 제자에게, 제자는 성모님께 맡기셨나이다.</p><p>● 지극히 거룩하신 어머니,<br>십자가 밑에서 맺어진 모자의 인연으로<br>저희를 품에 안아주시고<br>온갖 위험과 고통 중에 돌보아 주시며<br>저희 죽을 때에 저버리지 마소서.</p><p>◎ 아멘.</p>`},
                {id: 'etc_5', title: '성모 성심께 바치는 봉헌 기도', content: `<p>○ 어지신 어머니, 든든한 힘이신 동정녀,<br>하늘의 모후요 죄인의 피신처이신 성모님,<br>티없이 깨끗하신 성모 성심께<br>저희를 봉헌하나이다.</p><p>● 저희 자신과 가진 것을 모두 바치며<br>온전한 사랑으로<br>저희 가정과 조국을 성심께 봉헌하나이다.</p><p>○ 저희 몸과 마음을 바치오니<br>저희 안에 있는 것, 저희 주위에 있는 것<br>모두 성모님의 것이 되게 하시고<br>저희에게는 오로지<br>성모님 사랑의 한몫을 나누어 주소서.</p><p>● 성모님,<br>이 봉헌대로 살고자<br>저희는 세례 때와 첫영성체 때에 한 서약을<br>오늘 다시 새롭게 하나이다.</p><p>○ 저희는 신앙의 진리를 언제나 용감히 고백하며<br>교황과 그와 결합되어 있는 주교들에게<br>온전히 순종하고<br>하느님의 계명과 교회의 법규를 충실히 지키며<br>특별히 주일을 거룩히 지내고<br>열심히 살아가며<br>자주 영성체할 것을 약속하나이다.</p><p>● 하느님의 영광 지극하신 어머니,<br>인류의 어지신 어머니,<br>온 마음을 바쳐 어머니를 공경하며<br>하늘에서와 같이 땅에서도<br>저희와 모든 사람의 마음과<br>저희 조국과 온 세계에<br>티없이 깨끗하신 성심의 나라를<br>하루바삐 세우도록<br>충실히 노력할 것을 약속하나이다.</p><p>◎ 아멘.</p>`},
                {id: 'etc_4', title: '예수 성심께 바치는 봉헌 기도', content: `<p>○ 지극히 어지신 구세주 예수님,<br>주님 앞에 꿇어<br>주님의 성심께 저희 성당(병원, 학교...)을 봉헌하나이다.</p><p>● 주님께서는 언제나<br>저희 성당(병원, 학교...)을 보살펴 주소서.<br>저희는 온전히 성심께 의지하고 바라오니<br>저희 생각과 말과 행위를<br>주님의 거룩하신 뜻대로 다스리소서.</p><p>○ 예수님, 저희가 하는 일에 강복하시어<br>기쁠 때나 슬플 때나 저희와 함께 계시는<br>주님의 사랑을 깊이 깨달아<br>언제나 주님을 사랑하며 섬기게 하소서.</p><p>● 온 세상 어디서나 모든 이가<br>입을 모아 예수 성심을 찬미하며<br>사랑과 영광을 드리게 하소서.</p><p>◎ 아멘</p>`},

                        <p>그때에 예수님께서 유다인들에게 말씀하셨다. “내가 진실로 진실로 너희에게 말한다. 내 말을 듣고 나를 보내신 분을 믿는 이는 영생을 얻고 심판을 받지 않는다. 그는 이미 죽음에서 생명으로 건너갔다. 내가 진실로 진실로 너희에게 말한다. 죽은 이들이 하느님 아들의 목소리를 듣고 또 그렇게 들은 이들이 살아날 때가 온다. 지금이 바로 그때다. 아버지께서 당신 안에 생명을 가지고 계신 것처럼, 아들도 그 안에 생명을 가지게 해 주셨기 때문이다. 아버지께서는 또 그가 사람의 아들이므로 심판을 하는 권한도 주셨다. 이 말에 놀라지 마라. 무덤 속에 있는 모든 사람이 그의 목소리를 듣는 때가 온다. 그들이 무덤에서 나와, 선을 행한 이들은 부활하여 생명을 얻고 악을 저지른 자들은 부활하여 심판을 받을 것이다.”</p>

                        ○ 비계인 듯 기름인 듯 당신으로 저는 흐뭇하고 제 입술 흥겹게 당신을 노래하리이다.<br>

                        <p><span class="bold">1. 일반 문상객의 기도</span><br>

                        <p><span class="bold">3. 친구의 기도</span><br>

                        자비로우신 하느님 아버지,<br>
                        마음을 다하여 간절히 청하오니 성자 우리 주 예수 그리스도의 공로를 보시어 저희 벗 ( )에게 영원한 구원의 은혜를 베풀어 주소서.<br>

                        <p>○ 사람에게 자비를 베푸시는 예수님을 찬미하며 구하오니 성모님과 모든 성인의 간구를 들으시고<br>

                        <p><span class="bold">주님의 기도</span></p>
                        <span class="rubric">모두 무릎을 꿇고 ‘주님의 기도’를 다 함께 바친다.<br>

                {id: 'bong1_1', title: '위령 기도 2(짧은 위령 기도)', content: `<p><span class="symbol">†</span> 지극히 어지신 하느님 아버지,<br>저희는 그리스도를 믿으며 살다가 이 세상을 떠난 모든 이가<br>마지막 날에 그리스도와 함께 부활하리라 굳게 믿으며<br><span class="rubric">(아무)</span>의 영혼을 아버지 손에 맡겨드리나이다.</p><p>○ 이 주님의 종이 세상에 살아있을 때에<br>무수한 은혜를 베푸시어<br>아버지의 사랑과<br>그리스도 안에서 모든 성인의 통공을 드러내 보이셨으니<br>감사하나이다.</p><p>● 주님, 저희 기도를 자애로이 들으시어<br>이 주님의 종에게 천국 낙원의 문을 열어주시고<br>남아있는 저희는<br>그리스도 안에서 다시 만나<br>주님과 형제들과 함께 영원한 행복을 누릴 때까지<br>믿음의 말씀으로 서로 위로하며 살게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p><br><p><span class="rubric bold">시편 130(129)</span></p><p>○ 깊은 구렁 속에서<br>주님, 당신께 부르짖나이다.</p><p>● 주님, 제 소리를 들어주소서.<br>애원하는 제 소리에 당신 귀를 귀울이소서.</p><p>○ 주님, 당신이 죄악을 헤아리신다면<br>주님, 감당할 자 누구이리까?</p><p>● 당신은 용서하시는 분이시니<br>사람들이 당신을 경외하리이다.</p><p>○ 나 주님께 바라네.<br>내 영혼이 주님께 바라며<br>그분 말씀에 희망을 두네.</p><p>● 파수꾼이 새벽을 기다리기보다<br>내 영혼이 주님을 더 기다리네.</p><p>○ 파수꾼이 새벽을 기다리기보다<br>이스라엘이 주님을 더 기다리네.</p><p>● 주님께는 자애가 있고<br>풍요로운 구원이 있네.</p><p>○ 바로 그분이 이스라엘을<br>모든 죄악에서 구원하시리라.</p><br><p><span class="symbol">†</span> 주님, <span class="rubric">(아무)</span>에게 영원한 안식을 주소서.<br>◎ 영원한 빛을 그들에게 비추소서.</p><br><p><span class="rubric bold">시편 51(50), 3-21</span></p><p>○ 하느님, 당신 자애로 저를 불쌍히 여기소서.<br>당신의 크신 자비로 저의 죄악을 없애 주소서.</p><p>● 제 허물을 말끔히 씻어주시고<br>제 잘못을 깨끗이 지워 주소서.</p><p>○ 제 죄악을 제가 알고 있사오며<br>제 잘못이 언제나 제 앞에 있나이다.</p><p>● 당신께, 오로지 당신께 잘못을 저지르고<br>당신 눈앞에서 악한 짓을 하였사오니</p><p>○ 판결을 내리셔도 당신은 의로우시고<br>심판을 내리셔도 당신은 떳떳하시리이다.</p><p>● 보소서, 저는 죄 중에 태어났고<br>허물 중에 제 어미가저를 배었나이다.</p><p>○ 그러나 당신은 가슴속 진실을 기뻐하시고<br>남몰래 저에게 지혜를 주시나이다.</p><p>● 우슬초로 정화수로 뿌리소서.<br>제가 깨끗해지리이다.</p><p>○ 저를 씻어 주소서.<br>눈보다 더 희어지리이다.</p><p>● 기쁨과 즐거움을 맛보게 하소서.<br>당신이 부수신 뼈들이 춤을 추리이다.</p><p>○ 저의 허물에서 당신 얼굴을 돌리시고<br>저의 모든 죄를 없애 주소서.</p><p>● 하느님, 제 마음을 깨끗이 만드시고<br>제 안에 굳건한 영을 새롭게 하소서.</p><p>○ 당신 앞에서 저를 내치지 마시고<br>당신의 거룩한 영을 제게서 거두지 마소서.</p><p>● 구원의 기쁨을 제게 돌려 주시고<br>순종의 영으로 저를 받쳐 주소서.</p><p>○ 저는 악인들에게 당신의 길을 가르치리니<br>죄인들이 당신께 돌아오리이다.</p><p>● 하느님, 제 구원의 하느님, 죽음의 형벌에서 저를 구하소서.<br>제 혀가 당신 의로움에 환호하오리다.</p><p>○ 주님, 제 입술을 열어 주소서.<br>제 입이 당신을 찬양하오리다.</p><p>● 당신은 제사를 즐기지 않으시기에<br>제가 번제를 드려도 반기지 않으시리이다.</p><p>○ 하느님께 드리는 제물은 부서진 영,<br>부서지고 뉘우치는 마음을<br>하느님, 당신은 업신여기지 않으시나이다.</p><p>● 당신의 자애로 시온을 돌보시어<br>예루살렘의 성을 다시 쌓아 주소서.</p><p>○ 그때에 당신이 의로운 희생 제사, 제물과 번제를 즐기시리이다.<br>그때에 사람들이 수소를 당신 제단 위에 바치리이다.</p><br><p><span class="symbol">†</span> 주님, <span class="rubric">(아무)</span>에게 영원한 안식을 주소서.<br>◎ 영원한 빛을 그에게 비추소서.</p><p><span class="symbol">†</span> 주님, 저희의 기도를 들어주소서.<br>◎ 또한 저희의 부르짖음이 주님께 이르게 하소서.</p><br><span class="rubric">아래의 기도문 가운데 하나를 골라서 바친다.</span><br><p><span class="rubric">1. 사망일부터 장례일까지</span><br><span class="symbol">†</span> 기도합시다.<br>언제나 저희를 불쌍히 여기시어<br>너그러이 용서하시는 하느님,<br>(오늘) 이 세상을 떠난 <span class="rubric">(아무)</span>를 기억하시어<br>사탄의 손에 넘기지 마시고<br>거룩한 천사들이 천상 낙원으로 데려가게 하소서.<br><span class="rubric">(아무)</span>는 세상에서 주님을 바라고 믿었사오니<br>지옥벌을 면하고<br>영원한 기쁨을 얻게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p><br><p><span class="rubric">2. 장례 후 탈상일까지</span><br><span class="symbol">†</span> 기도합시다.<br>주님, 세상을 떠난 <span class="rubric">(아무)</span>를 생각하며 비오니<br>주님의 성인들과<br>뽑힌 이들 반열에 들어<br>주님의 영원한 기쁨을 누리게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p><br><p><span class="rubric">3. 기일에는</span><br><span class="symbol">†</span> 기도합시다.<br>너그러우신 주 하느님,<br><span class="rubric">(아무)</span>의 기일을 맞이하여 비오니<br>그에게 영원한 안식과 평화를 주시고<br>세상에 사는 저희가<br>주님의 말씀을 따라 살게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p><br><p><span class="rubric">4. 설이나 한가위에는</span><br><span class="symbol">†</span> 기도합시다.<br>주님, 세상을 떠난 조상들을 생각하며 비오니<br>그들이 주님의 성인들과<br>뽑힌 이들 반열에 들어<br>주님의 영원한 기쁨을 누리게 하소서.<br>우리 주 그리스도를 통하여 비나이다.</p><p>◎ 아멘.</p><br><span class="rubric">모두 무릎을 꿇고 주님의 기도, 성모송을 각각 한 번씩 하고, 아래의 기도로 위령 기도를 마친다.</span><br><p><span class="symbol">†</span> 주님, <span class="rubric">(아무)</span>에게 영원한 안식을 주소서.<br>◎ 영원한 빛을 그에게 비추소서.</p><p><span class="symbol">†</span> <span class="rubric">(아무)</span>와 세상을 떠난 모든 이가<br>하느님의 자비로 평화의 안식을 얻게 하소서.<br>◎ 아멘.</p>`}

                {id: 'bong2_1', title: '마침기도', content: `<p><span class="symbol">†</span> 성부와 성자와 성령의 이름으로,<br>◎ 아멘</p>

                        <p>천주의 성모님,<br>당신의 보호에 저희를 맡기오니<br>어려울 때에 저희의 간절한 기도를 외면하지 마시고<br>항상 모든 위험에서 저희를 구하소서.<br>영화롭고 복되신 동정녀시여.</p>

                        <p>사랑으로 불타는 힘찬 믿음을 저희에게 주소서.<br>이 믿음으로써 주님을 사랑하는 순수한 지향으로 저희의 모든 사명을 완수하고, 이웃 안에서 항상 주님을 뵙고 섬기렵니다.</p>

               {id: 'bong3_1', title: '십자가의 길', content: `<p><span class="rubric">아무 때나 바칠 수 있지만 특별히 사순시기 금요일과 성금요일에는 마땅히 바쳐야 한다.</span></p><br><p><span class="rubric">먼저 깊이 뉘우치고 아래의 기도를 바친다.</span></p><p><span class="symbol">†</span> 주 예수님,<br>저희를 위하여 온갖 수난을 겪으신<br>주님의 사랑을 묵상하며<br>성모님과 함께<br>십자가의 길을 걷고자 하나이다.<br>저희에게 죄를 뉘우치고<br>주님의 수난을 함께 나눌 마음을 주시어<br>언제나 주님을 사랑하게 하시며<br>성직자들을 거룩하게 하시고<br>모든 죄인이 회개하도록 은혜를 내려주소서.</p><br><p><span class="rubric">제1처로 가며</span></p><p>◎ 어머니께 청하오니<br>제 맘속에 주님 상처 깊이 새겨주소서.</p><br><p><span class="rubric bold">제1처</span> <span class="bold">예수님께서 사형 선고 받으심을 묵상합시다.</span></p><p><span class="symbol">†</span> 주님께서는 십자가로 온 세상을 구원하셨나이다.<br>◎ 예수 그리스도님,<br><span class="rubric">깊은 절을 하며</span><br>경배하며 찬송하나이다.</p><br><p>○ 구세주 예수님,<br>저희를 위하여<br>아무런 죄도 없이 극심한 모욕과 사형선고를 받으셨으니<br>죄인들이 마땅히 받아야 할 영원한 벌에서<br>저희를 구원하소서.</p><p><span class="rubric">잠깐 묵상한다.</span><br><span class="rubric">주님의 기도, 성모송, 영광송</span></p><br><p><span class="rubric">제 2처로 가며</span></p><p>◎ 어머니께 청하오니……</p><br><p><span class="rubric bold">제2처</span> <span class="bold">예수님께서 십자가 지심을 묵상합시다.</span></p><p><span class="symbol">†</span> 주님께서는 십자가로 온 세상을 구원하셨나이다.<br>◎ 예수 그리스도님,<br><span class="rubric">깊은 절을 하며</span><br>경배하며 찬송하나이다.</p><br><p>○ 구세주 예수님,<br>저희를 사랑하신 까닭에<br>이 무거운 십자가를 기꺼이 지고 가셨으니<br>저희도 주님을 사랑하며<br>주님께서 허락하시는 모든 십자가를<br>기꺼이 지게 하소서.</p><p><span class="rubric">잠깐 묵상한다.</span><br><span class="rubric">주님의 기도, 성모송, 영광송</span></p><br><p><span class="rubric">제3처로 가며</span></p><p>◎ 어머니께 청하오니……</p><br><p><span class="rubric bold">제3처</span> <span class="bold">예수님께서 기력이 떨어져 넘어지심을 묵상합시다.</span></p><p><span class="symbol">†</span> 주님께서는 십자가로 온 세상을 구원하셨나이다.<br>◎ 예수 그리스도님,<br><span class="rubric">깊은 절을 하며</span><br>경배하며 찬송하나이다.</p><br><p>○ 구세주 예수님,<br>무거운 십자가에 눌려 넘어지시는<br>고통과 모욕을 당하셨으니<br>저희가 언제나 주님을 변함없이 섬기며<br>죄에 떨어지는 일이 없게 하소서.</p><p><span class="rubric">잠깐 묵상한다.</span><br><span class="rubric">주님의 기도, 성모송, 영광송</span></p><br><p><span class="rubric">제4처로 가며</span></p><p>◎ 어머니께 청하오니……</p><br><p><span class="rubric bold">제4처</span> <span class="bold">예수님께서 성모님을 만나심을 묵상합시다.</span></p><p><span class="symbol">†</span> 주님께서는 십자가로 온 세상을 구원하셨나이다.<br>◎ 예수 그리스도님,<br><span class="rubric">깊은 절을 하며</span><br>경배하며 찬송하나이다.</p><br><p>○ 구세주 예수님과 성모 마리아님,<br>괴로운 십자가의 길에서 서로 만나시어<br>사무치는 아픔을 겪으셨으니<br>저의 마음에 사랑을 북돋아 주시어<br>주님과 성모님을 사랑하는 데에<br>장애 되는 모든 것을 물리치게 하소서.</p><p><span class="rubric">잠깐 묵상한다.</span><br><span class="rubric">주님의 기도, 성모송, 영광송</span></p><br><p><span class="rubric">제5처로 가며</span></p><p>◎ 어머니께 청하오니……</p><br><p><span class="rubric bold">제5처</span> <span class="bold">시몬이 예수님을 도와 십자가 짐을 묵상합시다.</span></p><p><span class="symbol">†</span> 주님께서는 십자가로 온 세상을 구원하셨나이다.<br>◎ 예수 그리스도님,<br><span class="rubric">깊은 절을 하며</span><br>경배하며 찬송하나이다.</p><br><p>○ 구세주 예수님,<br>시몬이 주님을 도와 십자가를 졌으니<br>저희도 주님께서 맡겨주시는 십자가를<br>날마다 기꺼이 지고 가게 하소서.</p><p><span class="rubric">잠깐 묵상한다.</span><br><span class="rubric">주님의 기도, 성모송, 영광송</span></p><br><p><span class="rubric">제6처로 가며</span></p><p>◎ 어머니께 청하오니……</p><br><p><span class="rubric bold">제6처</span> <span class="bold">베로니카, 수건으로 예수님의 얼굴을 닦아드림을 묵상합시다.</span></p><p><span class="symbol">†</span> 주님께서는 십자가로 온 세상을 구원하셨나이다.<br>◎ 예수 그리스도님,<br><span class="rubric">깊은 절을 하며</span><br>경배하며 찬송하나이다.</p><br><p>○ 구세주 예수님,<br>나쁜 무리가 주님의 얼굴에 침을 뱉고<br>주님을 업신여기며 모욕하였듯이<br>저희도 죄를 지을 때마다<br>주님의 얼굴을 더럽히는 것이오니<br>통회의 눈물로<br>주님의 얼굴을 씻어드리게 하소서.</p><p><span class="rubric">잠깐 묵상한다.</span><br><span class="rubric">주님의 기도, 성모송, 영광송</span></p><br><p><span class="rubric">제7처로 가며</span></p><p>◎ 어머니께 청하오니……</p><br><p><span class="rubric bold">제7처</span> <span class="bold">기력이 다하신 예수님께서 두 번째 넘어지심을 묵상합시다.</span></p><p><span class="symbol">†</span> 주님께서는 십자가로 온 세상을 구원하셨나이다.<br>◎ 예수 그리스도님,<br><span class="rubric">깊은 절을 하며</span><br>경배하며 찬송하나이다.</p><br><p>○ 구세주 예수님,<br>저희를 위하여 두 번째 넘어지시는 고욕을 당하셨으니<br>주님을 한결같이 섬기지 못하고<br>다시 죄에 떨어져<br>주님의 사랑을 저버리는 저희에게 자비를 베푸시어<br>다시는 세속과 육신의 간교한 유혹에 빠지지 않게 하소서.</p><p><span class="rubric">잠깐 묵상한다.</span><br><span class="rubric">주님의 기도, 성모송, 영광송</span></p><br><p><span class="rubric">제8처로 가며</span></p><p>◎ 어머니께 청하오니……</p><br><p><span class="rubric bold">제8처</span> <span class="bold">예수님께서 예루살렘 부인들을 위로하심을 묵상합시다.</span></p><p><span class="symbol">†</span> 주님께서는 십자가로 온 세상을 구원하셨나이다.<br>◎ 예수 그리스도님,<br><span class="rubric">깊은 절을 하며</span><br>경배하며 찬송하나이다.</p><br><p>○ 구세주 예수님,<br>저희 죄로 상처를 받으시고<br>온몸이 헤어지셨으니<br>저희에게 풍부한 은총을 내리시어<br>지난날에 지은 모든 죄를 뉘우치며<br>주님의 품을 찾아들게 하소서.</p><p><span class="rubric">잠깐 묵상한다.</span><br><span class="rubric">주님의 기도, 성모송, 영광송</span></p><br><p><span class="rubric">제9처로 가며</span></p><p>◎ 어머니께 청하오니……</p><br><p><span class="rubric bold">제9처</span> <span class="bold">예수님께서 세 번째 넘어지심을 묵상합시다.</span></p><p><span class="symbol">†</span> 주님께서는 십자가로 온 세상을 구원하셨나이다.<br>◎ 예수 그리스도님,<br><span class="rubric">깊은 절을 하며</span><br>경배하며 찬송하나이다.</p><br><p>○ 구세주 예수님,<br>무거운 저희 죄에 눌리시어<br>세 번이나 무참히 넘어지셨으니<br>그 수난의 공로를 저희에게 나누어 주시어<br>저희가 이미 지은 죄에서 다시 일어나게 하소서.</p><p><span class="rubric">잠깐 묵상한다.</span><br><span class="rubric">주님의 기도, 성모송, 영광송</span></p><br><p><span class="rubric">제10처로 가며</span></p><p>◎ 어머니께 청하오니……</p><br><p><span class="rubric bold">제10처</span> <span class="bold">예수님께서 옷 벗김 당하심을 묵상합시다.</span></p><p><span class="symbol">†</span> 주님께서는 십자가로 온 세상을 구원하셨나이다.<br>◎ 예수 그리스도님,<br><span class="rubric">깊은 절을 하며</span><br>경배하며 찬송하나이다.</p><br><p>○ 구세주 예수님,<br>병사들이 난폭하게 주님의 옷을 벗길 때에<br>살이 묻어나는 극도의 고통을 당하셨으며<br>죄수로 군중 앞에 서시는 모욕을 당하셨으니<br>저희가 모든 죄를 벗어버리게 하소서.</p><p><span class="rubric">잠깐 묵상한다.</span><br><span class="rubric">주님의 기도, 성모송, 영광송</span></p><br><p><span class="rubric">제11처로 가며</span></p><p>◎ 어머니께 청하오니……</p><br><p><span class="rubric bold">제11처</span> <span class="bold">예수님께서 십자가에 못박히심을 묵상합시다.</span></p><p><span class="symbol">†</span> 주님께서는 십자가로 온 세상을 구원하셨나이다.<br>◎ 예수 그리스도님,<br><span class="rubric">깊은 절을 하며</span><br>경배하며 찬송하나이다.</p><br><p>○ 구세주 예수님,<br>알몸으로 십자가에 못박혀 달리셨으니<br>저희도 주님과 같이<br>몸과 마음을 희생제물로 봉헌하게 하소서.</p><p><span class="rubric">잠깐 묵상한다.</span><br><span class="rubric">주님의 기도, 성모송, 영광송</span></p><br><p><span class="rubric">제12처로 가며</span></p><p>◎ 어머니께 청하오니……</p><br><p><span class="rubric bold">제12처</span> <span class="bold">예수님께서 십자가 위에서 돌아가심을 묵상합시다.</span></p><p><span class="symbol">†</span> 주님께서는 십자가로 온 세상을 구원하셨나이다.<br>◎ 예수 그리스도님,<br><span class="rubric">깊은 절을 하며</span><br>경배하며 찬송하나이다.</p><br><p>○ 구세주 예수님,<br>저희를 위하여 십자가 위에서 숨을 거두셨으니<br>저희도 십자가에 못박혀<br>다시는 저희 자신을 위하여 살지 않고<br>주님을 위하여 살게 하소서.<br>구세주 예수님,<br>혹시라도 영원히 주님을 떠날 불행이 저희에게 닥칠 양이면<br>차라리 지금 주님과 함께 죽는 행복을 내려주소서.</p><p><span class="rubric">잠깐 묵상한다.</span><br><span class="rubric">주님의 기도, 성모송, 영광송</span></p><br><p><span class="rubric">제13처로 가며</span></p><p>◎ 어머니께 청하오니……</p><br><p><span class="rubric bold">제13처</span> <span class="bold">제자들이 예수님 시신을 십자가에서 내림을 묵상합시다.</span></p><p><span class="symbol">†</span> 주님께서는 십자가로 온 세상을 구원하셨나이다.<br>◎ 예수 그리스도님,<br><span class="rubric">깊은 절을 하며</span><br>경배하며 찬송하나이다.</p><br><p>○ 구세주 예수님,<br>주님의 시신을 십자가에서 내려 품에 안으신<br>성모님의 전구를 들으시어<br>저희도 성모님 품안에서<br>효성스러운 자녀로 살다가<br>마침내 그 품안에서 죽게 하소서.</p><p><span class="rubric">잠깐 묵상한다.</span><br><span class="rubric">주님의 기도, 성모송, 영광송</span></p><br><p><span class="rubric">제14처로 가며</span></p><p>◎ 어머니께 청하오니……</p><br><p><span class="rubric bold">제14처</span> <span class="bold">예수님께서 무덤에 묻히심을 묵상합시다.</span></p><p><span class="symbol">†</span> 주님께서는 십자가로 온 세상을 구원하셨나이다.<br>◎ 예수 그리스도님,<br><span class="rubric">깊은 절을 하며</span><br>경배하며 찬송하나이다.</p><br><p>○ 돌무덤에 묻히신 구세주 예수님,<br>저희가 주님의 죽음을 생각하며<br>언제나 깨끗한 마음으로 정성을 다하여<br>사랑의 성체를 받아 모시게 하소서.</p><p><span class="rubric">잠깐 묵상한다.</span><br><span class="rubric">주님의 기도, 성모송, 영광송</span></p>`}
              ]
        };

        const listContainer = document.getElementById('prayer-list');
        const tabBtns = document.querySelectorAll('.tab-btn');
        let currentCategory = 'aim';

function getIcon(title) {
    if (title.includes('성모')) return 'fa-hands-praying';
    if (title.includes('묵주')) return 'fa-beads';
    if (title.includes('성인')) return 'fa-cross';
    if (title.includes('예수')) return 'fa-book-bible';
    return 'fa-cross';
}


        
        function renderList(category) {
            listContainer.innerHTML = '';
            const categoryData = prayerData[category];
            if (!categoryData || categoryData.length === 0) {
                listContainer.innerHTML = '<div class="empty-state">아직 등록된 기도문이 없습니다.</div>';
                return;
            }
            categoryData.forEach(prayer => {
                const li = document.createElement('li');
                li.className = 'prayer-item';
                li.onclick = () => { window.location.hash = `#prayer-${prayer.id}`; };
               

               
li.innerHTML = `
<div class="prayer-title">
    <i class="fa-solid ${getIcon(prayer.title)}"></i>
    ${prayer.title}
</div>
<div class="prayer-icon">
    <i class="fa-solid fa-chevron-right"></i>
</div>
`;
               
               
.prayer-title i,
.prayer-title svg {
    color: #8B5E3C !important;
    fill: #8B5E3C !important;
}

                listContainer.appendChild(li);
            });
        }

        tabBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                tabBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.getAttribute('data-category');
                renderList(currentCategory);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });

        renderList(currentCategory);

        function handleRouting() {
            const hash = window.location.hash;
            const detailView = document.getElementById('detail-view');
            if (hash.startsWith('#prayer-')) {
                const id = hash.replace('#prayer-', '');
                let foundPrayer = null;
                for (const key in prayerData) {
                    const found = prayerData[key].find(p => p.id === id);
                    if (found) { foundPrayer = found; break; }
                }
                if (foundPrayer) {
                    document.getElementById('detail-title').innerText = foundPrayer.title;
                    document.getElementById('detail-content').innerHTML = foundPrayer.content;
                    detailView.classList.add('show');
                } else {
                    detailView.classList.remove('show');
                }
            } else {
                detailView.classList.remove('show');
            }
        }

        window.addEventListener('hashchange', handleRouting);
        window.addEventListener('load', handleRouting);
    </script>
</body>
</html>
