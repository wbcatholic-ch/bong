<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>가톨릭 순례길</title>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=07f7989e29fdfb425fff924f36fb3ec0"></script>
<style>
:root {
  --brand: #8B1C2A;
  --brand-bg: #fdf5f5;
  --surface: #ffffff;
  --surface2: #f0f0f0;
  --border: #e4dada;
  --text: #1a1a1a;
  --text-sub: #5a5a5a;
  --text-muted: #aaa;
  --radius: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: var(--brand-bg);
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}
@media (min-width: 600px) {
  body { align-items: center; background: #ddd8d8; }
  .sr-wrap { max-width: 480px; box-shadow: 0 0 40px rgba(0,0,0,0.18); }
}

.sr-wrap {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--brand-bg);
}

/* ── 헤더: 지도/목록 탭만 ── */
.sr-header {
  background: var(--surface);
  border-bottom: 1.5px solid var(--border);
  flex-shrink: 0;
  z-index: 20;
  display: flex;
  padding: 0;
}
.sr-tab-btn {
  flex: 1;
  padding: 15px 0 13px;
  border: none;
  background: transparent;
  font-size: 15px;
  font-weight: 700;
  color: var(--text-muted);
  cursor: pointer;
  font-family: inherit;
  letter-spacing: -0.3px;
  border-bottom: 3px solid transparent;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.sr-tab-btn.active {
  color: var(--brand);
  border-bottom-color: var(--brand);
  background: var(--brand-bg);
}

/* ── 지도 패널 ── */
.sr-map-panel {
  flex: 1;
  position: relative;
  min-height: 0;
}
#srKakaoMap { width: 100%; height: 100%; }

/* 내 위치 버튼 */
.sr-locate-btn {
  position: absolute;
  bottom: 20px;
  right: 14px;
  background: var(--surface);
  border-radius: 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.18);
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 9px 14px;
  cursor: pointer;
  z-index: 5;
  font-size: 13px;
  font-weight: 700;
  color: var(--brand);
}
.sr-locate-btn span { font-size: 17px; }

/* ── 리스트 패널 ── */
.sr-list-panel {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 13px 80px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 0;
}
.sr-list-panel::-webkit-scrollbar { display: none; }
.sr-list-panel.hidden, .sr-map-panel.hidden { display: none; }

/* ── 카드 ── */
.sr-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  cursor: pointer;
  transition: transform 0.12s;
  overflow: hidden;
}
.sr-card:active { transform: scale(0.982); }

.sr-card-top {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 11px 13px 6px;
}
.sr-card-badge {
  padding: 3px 9px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.2px;
}
.sr-card-badge.diocese { background: #8B1C2A; }
.sr-card-badge.local   { background: #2a6b8b; }
.sr-card-region {
  font-size: 11.5px;
  color: var(--text-sub);
}

.sr-card-body {
  padding: 0 13px 11px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.sr-card-icon {
  width: 38px; height: 38px;
  border-radius: 9px;
  background: var(--brand-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.sr-card-info { flex: 1; min-width: 0; }
.sr-card-name {
  font-size: 14.5px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
  word-break: keep-all;
  white-space: normal;
  line-height: 1.35;
}
.sr-card-operator { font-size: 11.5px; color: var(--text-muted); }

.sr-card-footer {
  border-top: 1px solid #f0e8e8;
  padding: 8px 13px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  background: #fafafa;
}
.sr-card-url {
  font-size: 10.5px;
  color: var(--brand);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  min-width: 0;
}
.sr-card-mapbtn {
  flex-shrink: 0;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--brand);
  background: var(--brand-bg);
  border: 1.5px solid #e0bfbf;
  border-radius: 6px;
  padding: 4px 10px;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
}

/* ── 인포윈도우 ── */
.sr-infowindow {
  background: #fff;
  border-radius: 12px;
  padding: 13px 14px 12px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.18);
  min-width: 180px;
  max-width: 240px;
  position: relative;
  border: 1px solid #e4dada;
  font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
}
.sr-iw-top {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 7px;
}
.sr-iw-badge {
  padding: 3px 9px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.2px;
  white-space: nowrap;
}
.sr-iw-badge.diocese { background: #8B1C2A; }
.sr-iw-badge.local   { background: #2a6b8b; }
.sr-iw-region { font-size: 11.5px; color: #666; }
.sr-iw-name {
  font-size: 14px;
  font-weight: 800;
  color: #1a1a1a;
  margin-bottom: 3px;
  line-height: 1.35;
  word-break: keep-all;
}
.sr-iw-op { font-size: 11px; color: #aaa; margin-bottom: 10px; }
.sr-iw-btn {
  display: block;
  width: 100%;
  padding: 9px;
  background: #8B1C2A;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  font-family: inherit;
  letter-spacing: -0.2px;
}
.sr-iw-tail {
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 10px solid transparent;
  border-right: 10px solid transparent;
  border-top: 10px solid #fff;
  filter: drop-shadow(0 3px 3px rgba(0,0,0,0.08));
}
</style>
</head>
<body>

<script>
/* 카카오톡 인앱브라우저 감지 */
(function() {
  if (!/KAKAOTALK/i.test(navigator.userAgent || '')) return;
  if (/iPhone|iPad/i.test(navigator.userAgent)) {
    document.write('<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;padding:36px;text-align:center;gap:18px;background:#fdf5f5"><div style="font-size:40px">🌐</div><div style="font-size:17px;font-weight:800;color:#8B1C2A">Safari에서 열어주세요</div><div style="font-size:13px;color:#666;line-height:1.7">카카오톡에서는 지도 기능이<br>제한될 수 있습니다.<br><br>하단 <b>···</b> 버튼 → <b>Safari로 열기</b></div></div>');
    return;
  }
  location.href = 'intent://' + location.href.replace(/https?:\/\//, '')
    + '#Intent;scheme=https;package=com.sec.android.app.sbrowser;end';
})();
</script>

<div class="sr-wrap">
  <!-- 탭 헤더 -->
  <div class="sr-header">
    <button class="sr-tab-btn active" id="btnMap" onclick="switchView('map')">
      <span>🗺</span> 지도
    </button>
    <button class="sr-tab-btn" id="btnList" onclick="switchView('list')">
      <span>☰</span> 목록
    </button>
  </div>

  <!-- 지도 -->
  <div class="sr-map-panel" id="srMapPanel">
    <div id="srKakaoMap"></div>
    <div class="sr-locate-btn" onclick="moveToMyLocation()">
      <span>📍</span> 내 위치
    </div>
  </div>

  <!-- 목록 -->
  <div class="sr-list-panel hidden" id="srListPanel"></div>
</div>

<script>
const SUNRAEGIL_DATA = [
  { name:"천주교 서울 순례길",         operator:"서울대교구",            type:"diocese", region:"서울시",          lat:37.5644, lng:127.0104, icon:"✝️",  url:"https://martyrs.or.kr/_web/mpilgrims/about.html" },
  { name:"성지순례길 '디딤길'",        operator:"수원교구",              type:"diocese", region:"수원시",          lat:37.2832, lng:127.0170, icon:"🙏",  url:"https://www.casuwon.or.kr/holyland/pilgrimage" },
  { name:"순례길 '님의 길'",           operator:"원주교구",              type:"diocese", region:"원주·횡성·제천",   lat:37.3420, lng:127.9200, icon:"🌿",  url:"https://sunraegil.seoji.net/course/all" },
  { name:"한티가는길",                 operator:"대구대교구",            type:"diocese", region:"칠곡·대구팔공산",  lat:36.0168, lng:128.6299, icon:"⛰️", url:"https://hantigil.or.kr/index" },
  { name:"광주대교구 순례길",          operator:"광주대교구",            type:"diocese", region:"나주·영광",         lat:35.0369, lng:126.7152, icon:"🕊️", url:"https://www.gjcatholic.or.kr/holyland/pilgrimage/noan_naju" },
  { name:"천주교제주순례길",           operator:"제주교구",              type:"diocese", region:"제주",             lat:33.4463, lng:126.3027, icon:"🌊",  url:"http://santoviaggio.com/course/10?sca=%EC%A0%84%EC%B2%B4%EC%BD%94%EC%8A%A4&id=0301" },
  { name:"사제와 함께하는 도보순례",   operator:"안동교구",              type:"diocese", region:"문경·상주",          lat:36.8001, lng:128.2113, icon:"👣",  url:"https://www.acatholic.or.kr/sub4/sub2.asp" },
  { name:"요안루갈다길 외",            operator:"전주교구",              type:"diocese", region:"전주·완주",          lat:35.8031, lng:127.1677, icon:"🌾",  url:"https://www.jcatholic.or.kr/theme/main/pages/pilgrimage01.html" },
  { name:"보령 갈매못 성지순례길",     operator:"보령시",                type:"local",   region:"보령",             lat:36.4280, lng:126.5075, icon:"🌅",  url:"https://www.brcn.go.kr/tour/sub02_02_02.do" },
  { name:"내포 천주교 순례길",         operator:"사단법인 내포문화숲길", type:"local",   region:"예산·서산",           lat:36.7127, lng:126.5380, icon:"🌲",  url:"https://naepotrail.org/course/catholic" },
  { name:"버그내순례길",               operator:"당진시청",              type:"local",   region:"당진",             lat:36.8199, lng:126.7848, icon:"🏞️", url:"https://beogeunae.dangjin.go.kr/pil1.html" }
];

let map, markers = [], overlay = null;

function initMap() {
  map = new kakao.maps.Map(document.getElementById('srKakaoMap'), {
    center: new kakao.maps.LatLng(36.2, 127.9),
    level: 13
  });
  map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);
  renderMarkers();
  renderList();
  kakao.maps.event.addListener(map, 'click', closeOverlay);
}

function makeMarkerSVG(color, emoji) {
  const s = `<svg xmlns="http://www.w3.org/2000/svg" width="44" height="54" viewBox="0 0 44 54">
    <ellipse cx="22" cy="51" rx="10" ry="3.5" fill="rgba(0,0,0,0.14)"/>
    <path d="M22 2C12 2 4 10 4 22c0 13 18 30 18 30S40 35 40 22C40 10 32 2 22 2Z" fill="${color}" stroke="white" stroke-width="2.5"/>
    <text x="22" y="28" text-anchor="middle" font-size="18">${emoji}</text>
  </svg>`;
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(s);
}

function closeOverlay() {
  if (overlay) { overlay.setMap(null); overlay = null; }
}

/* 링크 열기 — 카카오톡 포함 전 환경 대응 */
function openUrl(url) {
  const ua = navigator.userAgent || '';
  if (/KAKAOTALK/i.test(ua) && !/iPhone|iPad/i.test(ua)) {
    location.href = 'intent://' + url.replace(/https?:\/\//, '')
      + '#Intent;scheme=https;package=com.sec.android.app.sbrowser;end';
    return;
  }
  /* location.href 방식: 카카오 인앱에서도 동작하는 경우 있음 */
  const a = document.createElement('a');
  a.href = url;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function renderMarkers() {
  markers.forEach(m => m.setMap(null));
  markers = [];
  closeOverlay();

  SUNRAEGIL_DATA.forEach((d, i) => {
    const color = d.type === 'diocese' ? '#8B1C2A' : '#2a6b8b';
    const marker = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(d.lat, d.lng),
      map,
      image: new kakao.maps.MarkerImage(
        makeMarkerSVG(color, d.icon),
        new kakao.maps.Size(44, 54),
        { offset: new kakao.maps.Point(22, 54) }
      ),
      title: d.name
    });

    kakao.maps.event.addListener(marker, 'click', () => {
      closeOverlay();
      const bc = d.type === 'diocese' ? 'diocese' : 'local';
      const bl = d.type === 'diocese' ? '교구 운영' : '지자체·단체';
      const safeUrl = d.url.replace(/'/g, "\\'");

      const div = document.createElement('div');
      div.className = 'sr-infowindow';
      div.innerHTML = `
        <div class="sr-iw-top">
          <span class="sr-iw-badge ${bc}">${bl}</span>
          <span class="sr-iw-region">📍 ${d.region}</span>
        </div>
        <div class="sr-iw-name">${d.icon} ${d.name}</div>
        <div class="sr-iw-op">${d.operator}</div>
        <button class="sr-iw-btn">홈페이지 방문 →</button>
        <div class="sr-iw-tail"></div>`;

      div.querySelector('.sr-iw-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        openUrl(d.url);
      });

      overlay = new kakao.maps.CustomOverlay({
        content: div, zIndex: 10,
        position: new kakao.maps.LatLng(d.lat, d.lng),
        yAnchor: 1.6
      });
      overlay.setMap(map);
      map.panTo(new kakao.maps.LatLng(d.lat, d.lng));
    });

    markers.push(marker);
  });
}

function renderList() {
  const panel = document.getElementById('srListPanel');
  panel.innerHTML = '';

  SUNRAEGIL_DATA.forEach((d, i) => {
    const bc = d.type === 'diocese' ? 'diocese' : 'local';
    const bl = d.type === 'diocese' ? '교구 운영' : '지자체·단체';
    const card = document.createElement('div');
    card.className = 'sr-card';
    card.innerHTML = `
      <div class="sr-card-top">
        <span class="sr-card-badge ${bc}">${bl}</span>
        <span class="sr-card-region">📍 ${d.region}</span>
      </div>
      <div class="sr-card-body">
        <div class="sr-card-icon">${d.icon}</div>
        <div class="sr-card-info">
          <div class="sr-card-name">${d.name}</div>
          <div class="sr-card-operator">${d.operator}</div>
        </div>
      </div>
      <div class="sr-card-footer">
        <span class="sr-card-url">${d.url.replace(/https?:\/\//, '')}</span>
        <button class="sr-card-mapbtn">지도 보기</button>
      </div>`;

    card.querySelector('.sr-card-mapbtn').addEventListener('click', e => {
      e.stopPropagation();
      switchView('map');
      setTimeout(() => {
        map.setLevel(8);
        map.panTo(new kakao.maps.LatLng(d.lat, d.lng));
        if (markers[i]) kakao.maps.event.trigger(markers[i], 'click');
      }, 60);
    });

    card.addEventListener('click', () => openUrl(d.url));
    panel.appendChild(card);
  });
}

function switchView(view) {
  const mp = document.getElementById('srMapPanel');
  const lp = document.getElementById('srListPanel');
  const bm = document.getElementById('btnMap');
  const bl = document.getElementById('btnList');
  if (view === 'map') {
    mp.classList.remove('hidden'); lp.classList.add('hidden');
    bm.classList.add('active');   bl.classList.remove('active');
    if (map) setTimeout(() => kakao.maps.event.trigger(map, 'resize'), 10);
  } else {
    mp.classList.add('hidden');   lp.classList.remove('hidden');
    bm.classList.remove('active'); bl.classList.add('active');
  }
}

function moveToMyLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    map.panTo(new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude));
    map.setLevel(7);
  }, () => alert('위치 정보를 가져올 수 없습니다.'));
}

kakao.maps.load(() => initMap());
</script>
</body>
</html>
