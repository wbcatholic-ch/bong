let current="cover",currentCat=null,currentTab=0,deferredPrompt=null;const fontSteps=[0.95,1,1.1,1.2,1.35];let fontIndex=Number(localStorage.getItem("fontIndex")||1);function applyFont(){document.documentElement.style.setProperty("--app-scale",fontSteps[fontIndex]);localStorage.setItem("fontIndex",String(fontIndex))}applyFont();function setActiveView(id){document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));document.getElementById(id).classList.add("active")}function goCover(push=true){current="cover";currentCat=null;currentTab=0;setActiveView("cover");if(push)history.pushState({view:"cover"},"","#cover")}function goDetail(cat,push=true){const cfg=CATS[cat];if(!cfg)return;current="detail";currentCat=cat;currentTab=0;document.getElementById("module-header").style.background=cfg.color;document.getElementById("header-title").textContent=cfg.title;document.getElementById("header-sub").textContent=cfg.sub;document.getElementById("header-icon").textContent=cfg.icon;document.documentElement.style.setProperty("--active",cfg.color);renderModule(cat);setActiveView("detail");if(push)history.pushState({view:"detail",cat},"","#"+cat)}function back(){if(current==="detail")goCover(false);else history.back()}function renderTabs(names){const tabs=document.getElementById("tabs");tabs.innerHTML=names.map((n,i)=>`<button class="tab-btn ${i===currentTab?'active':''}" data-tab="${i}">${n}</button>`).join("");tabs.querySelectorAll(".tab-btn").forEach(b=>b.onclick=()=>setTab(Number(b.dataset.tab)))}function setTab(i){const panels=document.querySelectorAll(".panel");if(i<0)i=panels.length-1;if(i>=panels.length)i=0;currentTab=i;document.querySelectorAll(".tab-btn").forEach((b,idx)=>b.classList.toggle("active",idx===i));panels.forEach((p,idx)=>p.classList.toggle("active",idx===i));dismissKeyboard()}function renderModule(cat){if(["shrine","parish","retreat"].includes(cat))renderMapModule(cat);if(cat==="prayer")renderPrayerModule();if(cat==="trail")renderTrailModule();if(cat==="web")renderWebModule();if(cat==="diocese")renderDioceseModule()}function panel(id,html,active=false){return `<div class="panel ${active?'active':''}" id="${id}">${html}</div>`}function renderMapModule(cat){const data=DATA[cat];renderTabs(["지도","목록","내주변","지역검색"]);const list=data.map((d,i)=>placeCard(d,i,cat)).join("");const regions=`<input class="search" id="regionSearch" placeholder="지역 또는 이름 검색" oninput="filterRegion('${cat}')"><div id="regionResult">${list}</div>`;document.getElementById("panels").innerHTML=panel("mapPanel",`<div class="map-wrap"><div class="fake-map"><div class="fake-grid"></div></div><div class="marker"></div><div class="info-card open" id="mapInfo"><div class="info-title">${data[0].name}</div><div class="info-sub">${data[0].addr}<br>${data[0].desc}</div><div style="margin-top:10px"><button class="action-btn">길찾기</button></div></div></div>`,true)+panel("listPanel",list)+panel("nearPanel",data.map((d,i)=>`<div class="card near-row list-item" onclick="openInfo('${cat}',${i})"><div class="near-num">${i+1}</div><div><div class="card-title">${d.name}</div><div class="card-sub">${d.addr}</div></div></div>`).join(""))+panel("regionPanel",regions)}function placeCard(d,i,cat){return `<div class="card list-item" onclick="openInfo('${cat}',${i})"><div class="card-title">${d.name}</div><div class="card-sub">${d.area} · ${d.addr}</div><div class="app-sub">${d.desc}</div></div>`}function openInfo(cat,i){const d=DATA[cat][i];setTab(0);document.getElementById("mapInfo").innerHTML=`<div class="info-title">${d.name}</div><div class="info-sub">${d.addr}<br>${d.desc}</div><div style="margin-top:10px"><button class="action-btn">길찾기</button></div>`}function filterRegion(cat){const q=document.getElementById("regionSearch").value.trim();const result=DATA[cat].filter(d=>!q||d.name.startsWith(q)||d.area.includes(q)).map((d,i)=>placeCard(d,i,cat)).join("");document.getElementById("regionResult").innerHTML=result||`<div class="card app-sub">검색 결과가 없습니다.</div>`}function renderPrayerModule(){const tabs=[...new Set(DATA.prayers.map(p=>p.tab))];renderTabs(tabs);document.getElementById("panels").innerHTML=tabs.map((t,i)=>{const items=DATA.prayers.filter(p=>p.tab===t).map(p=>`<div class="card" onclick="showPrayer('${encodeURIComponent(p.title)}')"><div class="card-title">${p.title}</div><div class="card-sub">기도문 보기</div></div>`).join("");return panel("prayer"+i,`<div class="prayer-list">${items}</div>`,i===0)}).join("")}function showPrayer(encoded){const title=decodeURIComponent(encoded);const p=DATA.prayers.find(x=>x.title===title);const active=currentTab;document.getElementById("panels").innerHTML=panel("prayerDetail",`<div class="card"><div class="card-title">${p.title}</div><div class="prayer-text" style="margin-top:12px">${p.body}</div></div>`,true);document.getElementById("tabs").innerHTML=`<button class="tab-btn active" onclick="renderPrayerModule(); setTab(${active});">목록으로</button>`}function renderTrailModule(){renderTabs(["전체","도보","순례"]);document.getElementById("panels").innerHTML=["전체","도보","순례"].map((t,i)=>{const arr=DATA.trail.filter(d=>t==="전체"||d.type===t);return panel("trail"+i,arr.map(d=>`<div class="card"><span class="badge">${d.type}</span><div class="card-title" style="margin-top:8px">${d.name}</div><div class="card-sub">${d.region}</div><div class="app-sub">${d.desc}</div></div>`).join(""),i===0)}).join("")}function renderWebModule(){const tabs=[...new Set(DATA.web.map(w=>w.cat))];renderTabs(tabs);document.getElementById("panels").innerHTML=tabs.map((t,i)=>panel("web"+i,DATA.web.filter(w=>w.cat===t).map(w=>`<div class="card" onclick="window.open('${w.url}','_blank')"><div class="card-title">${w.name}</div><div class="card-sub">${w.desc}</div><div class="app-sub">${w.url}</div></div>`).join(""),i===0)).join("")}function renderDioceseModule(){renderTabs(["관구","교구","전체"]);const make=(mode)=>DATA.diocese.filter(d=>mode==="전체"||d.kind===mode).map(d=>{const count=d.kind==="관구"?`<div class="diocese-count">${d.count||""}</div>`:(d.parishes?`<div class="diocese-count">${d.parishes}</div>`:"");return `<div class="card"><div class="diocese-line"><div class="diocese-main"><div class="card-title">${d.name}</div></div>${count}</div><div class="diocese-area">${d.area}</div></div>`}).join("");document.getElementById("panels").innerHTML=panel("prov",make("관구"),true)+panel("dio",make("교구"))+panel("all",make("전체"))}function dismissKeyboard(){if(document.activeElement&&document.activeElement.blur)document.activeElement.blur()}
document.querySelectorAll(".cover-btn").forEach(btn=>{btn.addEventListener("click",()=>{const cat=btn.dataset.cat;if(cat==="mass"){window.open(MASS_URL,"_blank");return}goDetail(cat)})});document.getElementById("back-btn").onclick=back;document.getElementById("qna-btn").onclick=()=>window.open(QNA_URL,"_blank");document.getElementById("font-down").onclick=()=>{fontIndex=Math.max(0,fontIndex-1);applyFont()};document.getElementById("font-up").onclick=()=>{fontIndex=Math.min(fontSteps.length-1,fontIndex+1);applyFont()};document.getElementById("font-reset").onclick=()=>{fontIndex=1;applyFont()};window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e});document.getElementById("install-btn").onclick=async()=>{if(deferredPrompt){deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null}else alert("브라우저 메뉴에서 '홈 화면에 추가' 또는 '앱 설치'를 선택해 주세요.")};history.replaceState({view:"cover"},"","#cover");window.addEventListener("popstate",e=>{if(e.state&&e.state.view==="detail"&&e.state.cat){goDetail(e.state.cat,false);return}goCover(false)});
let sx=0,sy=0;document.getElementById("detail").addEventListener("touchstart",e=>{if(!e.touches[0])return;sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});document.getElementById("detail").addEventListener("touchend",e=>{if(currentCat&&["shrine","parish","retreat"].includes(currentCat)&&currentTab===0)return;const t=e.changedTouches[0];if(!t)return;const dx=t.clientX-sx,dy=t.clientY-sy;if(Math.abs(dx)>70&&Math.abs(dx)>Math.abs(dy)*1.5){if(dx<0)setTab(currentTab+1);else setTab(currentTab-1)}},{passive:true});
