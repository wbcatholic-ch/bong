<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>가톨릭 순례길</title>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=07f7989e29fdfb425fff924f36fb3ec0"></script>
<style>
:root {
  --brand:    #8B1C2A;
  --brand-bg: #fdf5f5;
  --local:    #1a5f8b;
  --surface:  #ffffff;
  --border:   #e2d8d8;
  --text:     #1a1a1a;
  --text-sub: #5a5a5a;
  --radius:   14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: #ccc;
  display: flex; flex-direction: column;
  height: 100%; overflow: hidden;
}
@media (min-width:600px) {
  body { align-items: center; }
  .sr-wrap { max-width:480px; box-shadow:0 0 40px rgba(0,0,0,.25); }
}
.sr-wrap {
  width:100%; height:100%;
  display:flex; flex-direction:column;
  overflow:hidden; background:var(--brand-bg);
}

/* ─── 탭 ─── */
.sr-tabs {
  display:flex; flex-shrink:0; height:52px;
  border-bottom:2px solid var(--border);
  background:var(--surface); z-index:20;
}
.sr-tab {
  flex:1; border:none; cursor:pointer;
  font-family:inherit; font-size:16px; font-weight:700;
  display:flex; align-items:center; justify-content:center; gap:6px;
  /* 비활성: 회색 배경 + 흐린 글씨 */
  background:#ede8e8; color:#b0a0a0;
  border-bottom:3px solid transparent;
  transition:background .15s, color .15s, border-color .15s;
}
.sr-tab:first-child { border-right:1px solid var(--border); }
/* 활성: 흰배경 + 컬러 글씨 + 하단 강조선 */
.sr-tab.active {
  background:var(--surface); color:var(--brand);
  border-bottom:3px solid var(--brand);
}

/* ─── 지도 ─── */
.sr-map-panel { flex:1; position:relative; min-height:0; }
#srKakaoMap   { width:100%; height:100%; }

.sr-locate-btn {
  position:absolute; bottom:18px; right:12px;
  background:var(--surface);
  border-radius:24px;
  box-shadow:0 3px 14px rgba(0,0,0,.22);
  border:1.5px solid var(--border);
  display:flex; align-items:center; gap:6px;
  padding:10px 18px; cursor:pointer; z-index:10;
  font-size:14px; font-weight:700; color:var(--brand);
  font-family:inherit;
}

/* ─── 인포윈도우 ─── */
.sr-iw {
  background:#fff; border-radius:13px;
  padding:14px 15px 13px;
  box-shadow:0 6px 28px rgba(0,0,0,.22);
  min-width:200px; max-width:260px;
  position:relative; border:1px solid #e0d4d4;
  font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  /* ★ 포인터 이벤트 강제 활성화 */
  pointer-events:all !important;
  touch-action:auto !important;
}
.sr-iw-top {
  display:flex; align-items:center; gap:6px; margin-bottom:8px;
}
.sr-iw-op {
  font-size:12px; font-weight:800;
  padding:4px 10px; border-radius:5px; color:#fff; white-space:nowrap;
}
.sr-iw-op.diocese { background:var(--brand); }
.sr-iw-op.local   { background:var(--local); }
.sr-iw-region { font-size:12px; color:#666; }
.sr-iw-name {
  font-size:14px; font-weight:800; color:#111;
  margin-bottom:11px; line-height:1.4; word-break:keep-all;
}
/* ★ 버튼 전체를 터치 영역으로 — 인라인 스타일로 onclick 직접 */
.sr-iw-btn {
  display:block; width:100%; padding:11px;
  border:none; border-radius:9px;
  font-size:14px; font-weight:800; color:#fff;
  text-align:center; font-family:inherit;
  cursor:pointer;
  /* 터치 이벤트 직접 받도록 */
  pointer-events:all !important;
  touch-action:manipulation;
  -webkit-tap-highlight-color:rgba(0,0,0,.15);
}
.sr-iw-btn.diocese { background:var(--brand); }
.sr-iw-btn.local   { background:var(--local); }
.sr-iw-tail {
  position:absolute; bottom:-10px; left:50%;
  transform:translateX(-50%);
  width:0; height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-top:10px solid #fff;
  filter:drop-shadow(0 3px 2px rgba(0,0,0,.07));
}

/* ─── 목록 ─── */
.sr-list-panel {
  flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding:14px 13px 60px;
  display:flex; flex-direction:column; gap:12px;
  min-height:0;
}
.sr-list-panel::-webkit-scrollbar { display:none; }
.sr-list-panel.hidden, .sr-map-panel.hidden { display:none; }

/* ─── 카드 ─── */
.sr-card {
  background:var(--surface);
  border-radius:var(--radius);
  border:1px solid var(--border);
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  overflow:hidden;
  /* 카드 전체는 클릭 금지 — 내부 버튼만 */
}

/* 교구명 + 지역 */
.sr-card-top {
  display:flex; align-items:center; gap:8px;
  padding:13px 14px 0;
}
.sr-op-badge {
  font-size:12px; font-weight:800;
  padding:4px 11px; border-radius:5px;
  color:#fff; white-space:nowrap; flex-shrink:0;
}
.sr-op-badge.diocese { background:var(--brand); }
.sr-op-badge.local   { background:var(--local); }
.sr-region { font-size:12px; color:var(--text-sub); }

/* 아이콘 + 이름 */
.sr-card-body {
  display:flex; align-items:center; gap:13px;
  padding:10px 14px 13px;
}
.sr-card-ico {
  width:48px; height:48px; flex-shrink:0;
  border-radius:12px; background:var(--brand-bg);
  display:flex; align-items:center; justify-content:center;
  font-size:24px;
}
.sr-card-name {
  font-size:16px; font-weight:700; color:var(--text);
  word-break:keep-all; line-height:1.4; white-space:normal;
}

/* 버튼 2개 */
.sr-card-btns {
  display:flex; gap:8px;
  padding:0 14px 13px;
}
.sr-btn {
  flex:1; padding:11px 0;
  border:none; border-radius:9px;
  font-size:13px; font-weight:800; color:#fff;
  cursor:pointer; font-family:inherit; text-align:center;
  touch-action:manipulation;
  -webkit-tap-highlight-color:rgba(0,0,0,.15);
}
.sr-btn.go { }  /* 색은 js에서 클래스로 */
.sr-btn.map-btn {
  background:#fff !important;
  border:2px solid var(--border) !important;
  color:var(--text-sub) !important;
}
.sr-btn.diocese { background:var(--brand); }
.sr-btn.local   { background:var(--local); }

/* 내 위치 점 */
.sr-myloc-dot {
  width:18px; height:18px; border-radius:50%;
  background:#4285f4; border:3px solid #fff;
  box-shadow:0 0 0 4px rgba(66,133,244,.25);
}
</style>
</head>
<body>

<script>
/* 카카오톡 인앱 감지 */
(function(){
  if(!/KAKAOTALK/i.test(navigator.userAgent||'')) return;
  if(/iPhone|iPad/i.test(navigator.userAgent)){
    document.write('<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:40px;text-align:center;gap:20px;background:#fdf5f5;font-family:sans-serif"><div style="font-size:48px">🌐</div><div style="font-size:18px;font-weight:800;color:#8B1C2A">Safari에서 열어주세요</div><div style="font-size:14px;color:#666;line-height:1.8">하단 <b>···</b> → <b>Safari로 열기</b></div></div>');
    return;
  }
  location.href='intent://'+location.href.replace(/https?:\/\//,'')+'#Intent;scheme=https;package=com.sec.android.app.sbrowser;end';
})();
</script>

<div class="sr-wrap">
  <div class="sr-tabs">
    <button class="sr-tab active" id="tabMap" onclick="switchView('map')">🗺 지도</button>
    <button class="sr-tab"        id="tabList" onclick="switchView('list')">☰ 목록</button>
  </div>

  <div class="sr-map-panel" id="srMapPanel">
    <div id="srKakaoMap"></div>
    <button class="sr-locate-btn" onclick="moveToMyLocation()">📍 내 위치</button>
  </div>

  <div class="sr-list-panel hidden" id="srListPanel"></div>
</div>

<script>
/* ── 전역 이동 함수 ──
   CustomOverlay 안 onclick에서 호출 → location.href가 가장 안정적 */
function GO(url){
  /* 새 탭 시도 → 안 열리면 같은 탭으로 */
  var w = window.open(url,'_blank');
  if(!w || w.closed || typeof w.closed==='undefined'){
    location.href = url;
  }
}

var DATA=[
  {name:"천주교 서울 순례길",        op:"서울대교구",            t:"diocese", r:"서울시",          lat:37.5644,lng:127.0104,ico:"✝️", url:"https://martyrs.or.kr/_web/mpilgrims/about.html"},
  {name:"성지순례길 '디딤길'",       op:"수원교구",              t:"diocese", r:"수원시",          lat:37.2832,lng:127.0170,ico:"🙏", url:"https://www.casuwon.or.kr/holyland/pilgrimage"},
  {name:"순례길 '님의 길'",          op:"원주교구",              t:"diocese", r:"원주·횡성·제천",   lat:37.3420,lng:127.9200,ico:"🌿", url:"https://sunraegil.seoji.net/course/all"},
  {name:"한티가는길",                op:"대구대교구",            t:"diocese", r:"칠곡·대구팔공산",  lat:36.0168,lng:128.6299,ico:"⛰️",url:"https://hantigil.or.kr/index"},
  {name:"광주대교구 순례길",         op:"광주대교구",            t:"diocese", r:"나주·영광",        lat:35.0369,lng:126.7152,ico:"🕊️",url:"https://www.gjcatholic.or.kr/holyland/pilgrimage/noan_naju"},
  {name:"천주교제주순례길",          op:"제주교구",              t:"diocese", r:"제주",             lat:33.4463,lng:126.3027,ico:"🌊", url:"http://santoviaggio.com/course/10?sca=%EC%A0%84%EC%B2%B4%EC%BD%94%EC%8A%A4&id=0301"},
  {name:"사제와 함께하는 도보순례",  op:"안동교구",              t:"diocese", r:"문경·상주",        lat:36.8001,lng:128.2113,ico:"👣", url:"https://www.acatholic.or.kr/sub4/sub2.asp"},
  {name:"요안루갈다길 외",           op:"전주교구",              t:"diocese", r:"전주·완주",        lat:35.8031,lng:127.1677,ico:"🌾", url:"https://www.jcatholic.or.kr/theme/main/pages/pilgrimage01.html"},
  {name:"보령 갈매못 성지순례길",    op:"보령시",                t:"local",   r:"보령",             lat:36.4280,lng:126.5075,ico:"🌅", url:"https://www.brcn.go.kr/tour/sub02_02_02.do"},
  {name:"내포 천주교 순례길",        op:"사단법인 내포문화숲길", t:"local",   r:"예산·서산",        lat:36.7127,lng:126.5380,ico:"🌲", url:"https://naepotrail.org/course/catholic"},
  {name:"버그내순례길",              op:"당진시청",              t:"local",   r:"당진",             lat:36.8199,lng:126.7848,ico:"🏞️",url:"https://beogeunae.dangjin.go.kr/pil1.html"}
];

var map,markers=[],overlay=null,myLoc=null;

function initMap(){
  map=new kakao.maps.Map(document.getElementById('srKakaoMap'),{
    center:new kakao.maps.LatLng(36.2,127.9), level:13
  });
  map.addControl(new kakao.maps.ZoomControl(),kakao.maps.ControlPosition.RIGHT);
  buildMarkers();
  buildList();
  kakao.maps.event.addListener(map,'click',closeOv);
}

function markerSVG(color,emoji){
  var s='<svg xmlns="http://www.w3.org/2000/svg" width="44" height="54" viewBox="0 0 44 54">'
    +'<ellipse cx="22" cy="51" rx="10" ry="3.5" fill="rgba(0,0,0,0.14)"/>'
    +'<path d="M22 2C12 2 4 10 4 22c0 13 18 30 18 30S40 35 40 22C40 10 32 2 22 2Z" fill="'+color+'" stroke="white" stroke-width="2.5"/>'
    +'<text x="22" y="28" text-anchor="middle" font-size="18">'+emoji+'</text>'
    +'</svg>';
  return 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(s);
}

function closeOv(){
  if(overlay){overlay.setMap(null);overlay=null;}
}

function buildMarkers(){
  markers.forEach(function(m){m.setMap(null);});
  markers=[];
  closeOv();

  DATA.forEach(function(d,i){
    var color=d.t==='diocese'?'#8B1C2A':'#1a5f8b';
    var mk=new kakao.maps.Marker({
      position:new kakao.maps.LatLng(d.lat,d.lng),
      map:map,
      image:new kakao.maps.MarkerImage(markerSVG(color,d.ico),new kakao.maps.Size(44,54),{offset:new kakao.maps.Point(22,54)}),
      title:d.name
    });

    (function(d,i){
      kakao.maps.event.addListener(mk,'click',function(){
        closeOv();
        var bc=d.t==='diocese'?'diocese':'local';

        /* DOM 노드로 생성 — innerHTML onclick은 일부 환경서 차단됨
           대신 addEventListener로 직접 바인딩                        */
        var wrap=document.createElement('div');
        wrap.className='sr-iw';

        var top=document.createElement('div');
        top.className='sr-iw-top';
        top.innerHTML='<span class="sr-iw-op '+bc+'">'+d.op+'</span><span class="sr-iw-region">📍 '+d.r+'</span>';

        var nm=document.createElement('div');
        nm.className='sr-iw-name';
        nm.textContent=d.ico+' '+d.name;

        var btn=document.createElement('button');
        btn.className='sr-iw-btn '+bc;
        btn.textContent='홈페이지 방문 →';

        /* ★ touchend + click 모두 바인딩 — 모바일 터치 이벤트 확실히 캐치 */
        function doGo(e){
          e.preventDefault();
          e.stopPropagation();
          location.href=d.url;   /* 가장 안정적인 네비게이션 */
        }
        btn.addEventListener('touchend',doGo,{passive:false});
        btn.addEventListener('click',doGo);

        var tail=document.createElement('div');
        tail.className='sr-iw-tail';

        wrap.appendChild(top);
        wrap.appendChild(nm);
        wrap.appendChild(btn);
        wrap.appendChild(tail);

        overlay=new kakao.maps.CustomOverlay({
          content:wrap, zIndex:10,
          position:new kakao.maps.LatLng(d.lat,d.lng),
          yAnchor:1.65
        });
        overlay.setMap(map);
        map.panTo(new kakao.maps.LatLng(d.lat,d.lng));
      });
    })(d,i);

    markers.push(mk);
  });
}

function buildList(){
  var panel=document.getElementById('srListPanel');
  panel.innerHTML='';

  DATA.forEach(function(d,i){
    var bc=d.t==='diocese'?'diocese':'local';

    var card=document.createElement('div');
    card.className='sr-card';

    /* 상단: 교구명 뱃지 + 지역 */
    var top=document.createElement('div');
    top.className='sr-card-top';
    top.innerHTML='<span class="sr-op-badge '+bc+'">'+d.op+'</span><span class="sr-region">📍 '+d.r+'</span>';

    /* 본문: 아이콘 + 이름 */
    var body=document.createElement('div');
    body.className='sr-card-body';
    body.innerHTML='<div class="sr-card-ico">'+d.ico+'</div><div class="sr-card-name">'+d.name+'</div>';

    /* 버튼 2개: 홈페이지 / 지도 보기 */
    var btns=document.createElement('div');
    btns.className='sr-card-btns';

    var goBtn=document.createElement('button');
    goBtn.className='sr-btn go '+bc;
    goBtn.textContent='🔗 홈페이지';

    var mapBtn=document.createElement('button');
    mapBtn.className='sr-btn map-btn';
    mapBtn.textContent='🗺 지도 보기';

    /* 홈페이지 버튼: touchend+click */
    function doGo(e){
      e.preventDefault(); e.stopPropagation();
      location.href=d.url;
    }
    goBtn.addEventListener('touchend',doGo,{passive:false});
    goBtn.addEventListener('click',doGo);

    /* 지도 버튼 */
    mapBtn.addEventListener('click',function(e){
      e.stopPropagation();
      switchView('map');
      setTimeout(function(){
        map.setLevel(8);
        map.panTo(new kakao.maps.LatLng(d.lat,d.lng));
        if(markers[i]) kakao.maps.event.trigger(markers[i],'click');
      },60);
    });

    btns.appendChild(goBtn);
    btns.appendChild(mapBtn);
    card.appendChild(top);
    card.appendChild(body);
    card.appendChild(btns);
    panel.appendChild(card);
  });
}

function switchView(v){
  var mp=document.getElementById('srMapPanel');
  var lp=document.getElementById('srListPanel');
  var tm=document.getElementById('tabMap');
  var tl=document.getElementById('tabList');
  if(v==='map'){
    mp.classList.remove('hidden'); lp.classList.add('hidden');
    tm.classList.add('active');    tl.classList.remove('active');
    if(map) setTimeout(function(){kakao.maps.event.trigger(map,'resize');},10);
  } else {
    mp.classList.add('hidden');    lp.classList.remove('hidden');
    tm.classList.remove('active'); tl.classList.add('active');
  }
}

function moveToMyLocation(){
  if(!navigator.geolocation){alert('위치 서비스를 지원하지 않습니다.');return;}
  navigator.geolocation.getCurrentPosition(
    function(pos){
      var ll=new kakao.maps.LatLng(pos.coords.latitude,pos.coords.longitude);
      map.panTo(ll); map.setLevel(7);
      if(myLoc) myLoc.setMap(null);
      var dot=document.createElement('div');
      dot.className='sr-myloc-dot';
      myLoc=new kakao.maps.CustomOverlay({content:dot,position:ll,yAnchor:0.5,zIndex:20});
      myLoc.setMap(map);
    },
    function(err){
      alert(err.code===1?'위치 권한이 거부되었습니다.\n브라우저 설정에서 허용해 주세요.':'위치를 가져올 수 없습니다.');
    },
    {enableHighAccuracy:true,timeout:8000}
  );
}

kakao.maps.load(function(){initMap();});
</script>
</body>
</html>
